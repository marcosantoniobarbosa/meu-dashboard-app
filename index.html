// ════════ ESTUDO SEMANAL (barras + linha de desempenho) ════════
function parseBRDate(str){ // "dd/mm/aaaa" -> Date
  const[d,m,y]=str.split('/').map(Number);
  return new Date(y,m-1,d);
}
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
// estado do quadro "Progresso": período, métrica, navegação
let weekOffset=0;   // deslocamento de semanas (0 = semana atual)
let monthOffset=0;  // deslocamento de meses (0 = mês atual)
let weeklyPeriod='semana'; // 'semana' | 'mes' | 'total'
let weeklyMode='questoes'; // 'tempo' | 'questoes'
// filtros das séries (modo questões)
let wkFilter={acertos:true, erros:true, desempenho:true};
const MN_FULL=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MN_AB3=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
// semana (domingo a sábado) deslocada de `offset` semanas a partir de TODAY
function weekDays(offset=0){
  const base=new Date(TODAY);
  const dow=base.getDay(); // 0=Dom
  const sunday=new Date(base); sunday.setDate(base.getDate()-dow+offset*7);
  const days=[];
  for(let i=0;i<7;i++){ const d=new Date(sunday); d.setDate(sunday.getDate()+i); days.push(d); }
  return days;
}
function renderWeekly(mode){
  const cont=document.getElementById('weeklyChart');
  if(!cont) return;
  weeklyMode=mode;
  const DOW=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
  const fmtBR=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});

  // ── monta os "baldes" conforme o período ──
  let buckets=[], rangeLabel='', canPrev=true, canNext=false, showVals=true, labelEvery=1;
  if(weeklyPeriod==='semana'){
    const wd=weekDays(weekOffset);
    buckets=wd.map(d=>({label:DOW[d.getDay()], match:s=>sameDay(parseBRDate(s.date),d)}));
    rangeLabel=`${fmtBR(wd[0])} — ${fmtBR(wd[6])}`;
    canNext=weekOffset<0;
  } else if(weeklyPeriod==='mes'){
    const base=new Date(TODAY.getFullYear(),TODAY.getMonth()+monthOffset,1);
    const y=base.getFullYear(), m=base.getMonth();
    const nd=new Date(y,m+1,0).getDate();
    for(let dd=1;dd<=nd;dd++){ const d=new Date(y,m,dd); buckets.push({label:String(dd), match:s=>sameDay(parseBRDate(s.date),d)}); }
    rangeLabel=`${MN_FULL[m]} ${y}`;
    canNext=monthOffset<0; showVals=true; labelEvery=2;
  } else { // total: meses do 1º registro (ou mês atual) até o mês atual
    let first=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    S.sessions.forEach(s=>{ const d=parseBRDate(s.date); const fd=new Date(d.getFullYear(),d.getMonth(),1); if(fd<first) first=fd; });
    const endM=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    let cur=new Date(first);
    while(cur<=endM){ const cy=cur.getFullYear(), cm=cur.getMonth();
      buckets.push({label:MN_AB3[cm], match:s=>{const sd=parseBRDate(s.date); return sd.getMonth()===cm&&sd.getFullYear()===cy;}});
      cur.setMonth(cur.getMonth()+1);
    }
    rangeLabel='Todo o histórico';
    canPrev=false; canNext=false;
    showVals=buckets.length<=12; labelEvery=buckets.length>14?2:1;
  }
  const N=buckets.length;

  // rótulo de data + estado dos botões de navegação
  const rl=document.getElementById('weeklyRange'); if(rl) rl.textContent=rangeLabel;
  const prevBtn=document.getElementById('weekPrev'); if(prevBtn) prevBtn.disabled=!canPrev;
  const nextBtn=document.getElementById('weekNext'); if(nextBtn) nextBtn.disabled=!canNext;

  // agrega por balde
  const per=buckets.map(bk=>{
    const sess=S.sessions.filter(bk.match);
    const minutes=sess.reduce((a,b)=>a+b.minutes,0);
    const q=sess.reduce((a,b)=>a+(b.q||0),0);
    const qr=sess.reduce((a,b)=>a+(b.qr||0),0);
    const perf=q?Math.round(qr/q*100):null;
    return {minutes,q,qr,perf};
  });

  const isTempo=mode==='tempo';
  const vals=per.map(p=>isTempo?p.minutes:p.q);
  const totalVal=vals.reduce((a,b)=>a+b,0);
  const maxVal=Math.max(1,...vals);
  const totQ=per.reduce((a,b)=>a+b.q,0), totQR=per.reduce((a,b)=>a+b.qr,0);
  const avgPerf=totQ?Math.round(totQR/totQ*100):0;

  if(totalVal===0 && totQ===0){
    cont.innerHTML=`<div class="empty-state" style="padding:30px"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2"/></svg><div>Sem registros neste período ainda.</div></div>`;
    return;
  }

  // viewBox ~= largura real do container → fontes em tamanho nativo (responsivo)
  const W=Math.max(360, Math.min(1400, Math.round(cont.clientWidth||700)));
  const H=300, padL=34, padR=isTempo?30:40, padT=16, padB=28;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const gap=plotW/N;
  const barW=Math.max(2, Math.min(gap*0.6, 30));
  const GREEN='#3ec99a', RED='#f0788a';

  // barras
  let bars='';
  per.forEach((p,i)=>{
    const x=padL+gap*i+gap/2-barW/2, cx=x+barW/2, rr=Math.min(4,barW/2);
    if(isTempo){
      const v=p.minutes; if(v<=0) return;
      const h=v/maxVal*plotH, yTop=padT+plotH-h;
      bars+=`<rect x="${x.toFixed(1)}" y="${yTop.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h,3).toFixed(1)}" rx="${rr.toFixed(1)}" fill="${GREEN}"/>`;
      if(showVals) bars+=`<text x="${cx.toFixed(1)}" y="${(yTop-4).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">${fmtH(v)}</text>`;
    } else {
      if(p.q<=0) return;
      const qr=p.qr, qe=p.q-p.qr, baseY=padT+plotH;
      const hGreen=qr/maxVal*plotH, hRed=qe/maxVal*plotH;
      const yGreenTop=baseY-hGreen, yRedTop=baseY-hGreen-hRed;
      if(qr>0 && wkFilter.acertos) bars+=`<path d="${roundedRect(x,yGreenTop,barW,hGreen,qe>0&&wkFilter.erros?0:rr,rr)}" fill="${GREEN}"/>`;
      if(qe>0 && wkFilter.erros) bars+=`<path d="${roundedRect(x,yRedTop,barW,hRed,rr,qr>0&&wkFilter.acertos?0:rr)}" fill="${RED}"/>`;
      if(showVals){
        if(qe>0 && wkFilter.erros){
          if(hRed>=14) bars+=`<text x="${cx.toFixed(1)}" y="${(yRedTop+hRed/2).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#fff" font-family="Plus Jakarta Sans">${qe}</text>`;
          else bars+=`<text x="${cx.toFixed(1)}" y="${(yRedTop-4).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="${RED}" font-family="Plus Jakarta Sans">${qe}</text>`;
        }
        if(qr>0 && wkFilter.acertos){
          if(hGreen>=14) bars+=`<text x="${cx.toFixed(1)}" y="${(yGreenTop+hGreen/2).toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="700" fill="#fff" font-family="Plus Jakarta Sans">${qr}</text>`;
          else bars+=`<text x="${cx.toFixed(1)}" y="${(yGreenTop-4).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="700" fill="${GREEN}" font-family="Plus Jakarta Sans">${qr}</text>`;
        }
      }
    }
  });

  // linha de desempenho (modo questões)
  let line='', dots='';
  if(!isTempo && wkFilter.desempenho){
    const yOf=perf=>padT+plotH-(perf/100*plotH);
    const valid=per.map((p,i)=>({x:padL+gap*i+gap/2, perf:p.perf})).filter(p=>p.perf!==null);
    if(valid.length>=2){
      let dpath=`M ${valid[0].x.toFixed(1)} ${yOf(valid[0].perf).toFixed(1)}`;
      for(let i=0;i<valid.length-1;i++){
        const p0=valid[Math.max(0,i-1)], p1=valid[i], p2=valid[i+1], p3=valid[Math.min(valid.length-1,i+2)];
        const c1x=p1.x+(p2.x-p0.x)/6, c1y=yOf(p1.perf)+(yOf(p2.perf)-yOf(p0.perf))/6;
        const c2x=p2.x-(p3.x-p1.x)/6, c2y=yOf(p2.perf)-(yOf(p3.perf)-yOf(p1.perf))/6;
        dpath+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${yOf(p2.perf).toFixed(1)}`;
      }
      line=`<path d="${dpath}" fill="none" stroke="${cssVar('--brand2')}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    }
    valid.forEach(p=>{ dots+=`<circle cx="${p.x.toFixed(1)}" cy="${yOf(p.perf).toFixed(1)}" r="3.5" fill="${cssVar('--brand2')}" stroke="${cssVar('--card')}" stroke-width="1.5"/>`; });
  }

  // grade + eixos
  let grid='';
  for(let g=0;g<=5;g++){
    const y=padT+plotH/5*g;
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${cssVar('--grid')}" stroke-width="1"/>`;
    const leftVal=isTempo?fmtH(Math.round(maxVal*(5-g)/5)):Math.round(maxVal*(5-g)/5);
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="10" fill="${cssVar('--ink2')}" font-family="JetBrains Mono">${leftVal}</text>`;
    if(!isTempo) grid+=`<text x="${W-padR+5}" y="${(y+3).toFixed(1)}" text-anchor="start" font-size="10" fill="${cssVar('--ink2')}" font-family="JetBrains Mono">${(100*(5-g)/5)+'%'}</text>`;
  }

  // rótulos do eixo X
  let dlabels='';
  buckets.forEach((bk,i)=>{
    if(labelEvery>1 && i%labelEvery!==0 && i!==N-1) return;
    dlabels+=`<text x="${(padL+gap*i+gap/2).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="11" font-weight="600" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">${bk.label}</text>`;
  });

  const COL_OK='#3ec99a', COL_ERR='#f0788a', COL_DES=cssVar('--brand2')||'#7c5cff';
  cont.innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">${grid}${bars}${line}${dots}${dlabels}</svg>
    <div class="evo-legend">
      ${isTempo
        ? `<button class="evo-leg on" data-wk="tempo" style="--lc:${COL_OK}">Tempo: ${fmtH(totalVal)}</button>`
        : `<button class="evo-leg${wkFilter.acertos?' on':''}" data-wk="acertos" style="--lc:${COL_OK}">Acertos: ${totQR}</button>
           <button class="evo-leg${wkFilter.erros?' on':''}" data-wk="erros" style="--lc:${COL_ERR}">Erros: ${totQ-totQR}</button>
           <button class="evo-leg${wkFilter.desempenho?' on':''}" data-wk="desempenho" style="--lc:${COL_DES}">Desempenho: ${avgPerf}%</button>`}
    </div>`;
  cont.querySelectorAll('[data-wk]').forEach(b=>b.addEventListener('click',()=>{
    const k=b.dataset.wk;
    if(k==='tempo') return;
    wkFilter[k]=!wkFilter[k];
    renderWeekly(mode);
  }));
}

// ════════ TEMPO DE ESTUDO (pizza por disciplina) ════════
function renderPie(mode){
  const cont=document.getElementById('pieChart');
  if(!cont) return;
  const now=new Date(TODAY);
  function inPeriod(dateStr){
    const d=parseBRDate(dateStr);
    if(mode==='hoje') return sameDay(d,now);
    if(mode==='semana'){ const wd=weekDays(); return d>=wd[0]&&d<=new Date(wd[6].getFullYear(),wd[6].getMonth(),wd[6].getDate(),23,59); }
    if(mode==='mes') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true; // total
  }
  const byDisc=DISC.map(d=>{
    const m=S.sessions.filter(s=>s.disc===d.id&&inPeriod(s.date)).reduce((a,b)=>a+b.minutes,0);
    return {d,m};
  }).filter(x=>x.m>0);
  const total=byDisc.reduce((a,b)=>a+b.m,0);

  if(total===0){
    cont.innerHTML=`<div class="empty-state" style="padding:34px 20px"><svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 3v9l6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><div>Nenhum tempo registrado neste período.</div></div>`;
    return;
  }

  // donut: cada disciplina = um setor do anel com pontas retas e cantos arredondados
  const size=170, cx=size/2, cy=size/2, stroke=23, midR=size/2-stroke/2-2;
  const rOut=midR+stroke/2, rIn=midR-stroke/2, TAU=Math.PI*2;
  const single=byDisc.length===1;          // 1 disciplina: anel cheio, sem corte
  const gapPx=single?0:7;                   // vão (px) entre segmentos ao longo do anel
  const gapAng=gapPx/midR;
  const cornerRatio=0.32;                   // quão arredondados ficam os cantos (0=quadrado, .5=máximo)
  const P=(R,a)=>`${(cx+R*Math.cos(a)).toFixed(3)} ${(cy+R*Math.sin(a)).toFixed(3)}`;
  function segPath(a0,a1){
    let cr=Math.min(stroke*cornerRatio, rOut*(a1-a0)*0.42);
    if(cr<0.1) cr=0.1;
    const dOut=cr/rOut, dIn=cr/rIn;
    const oa0=a0+dOut, oa1=a1-dOut, ia0=a0+dIn, ia1=a1-dIn;
    const laOut=(oa1-oa0)>Math.PI?1:0, laIn=(ia1-ia0)>Math.PI?1:0;
    return `M ${P(rOut,oa0)} `
      +`A ${rOut} ${rOut} 0 ${laOut} 1 ${P(rOut,oa1)} `
      +`Q ${P(rOut,a1)} ${P(rOut-cr,a1)} `
      +`L ${P(rIn+cr,a1)} `
      +`Q ${P(rIn,a1)} ${P(rIn,ia1)} `
      +`A ${rIn} ${rIn} 0 ${laIn} 0 ${P(rIn,ia0)} `
      +`Q ${P(rIn,a0)} ${P(rIn+cr,a0)} `
      +`L ${P(rOut-cr,a0)} `
      +`Q ${P(rOut,a0)} ${P(rOut,oa0)} Z`;
  }
  let segs='', startA=-Math.PI/2;
  byDisc.forEach(x=>{
    const slice=(x.m/total)*TAU;
    if(single){
      segs+=`<circle cx="${cx}" cy="${cy}" r="${midR}" fill="none" stroke="${x.d.color}" stroke-width="${stroke}"/>`;
    }else{
      const eff=Math.min(gapAng, slice*0.6);
      segs+=`<path d="${segPath(startA+eff/2, startA+slice-eff/2)}" fill="${x.d.color}"/>`;
    }
    startA+=slice;
  });

  cont.innerHTML=`
    <div class="pie-wrap">
      <div class="pie-donut">
        <div style="position:relative;width:${size}px;height:${size}px">
          <svg viewBox="0 0 ${size} ${size}" style="width:100%;height:100%">
            ${segs}
          </svg>
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:22px;font-weight:800;line-height:1">${fmtH(total)}</div>
            <div style="font-size:10px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:2px">estudadas</div>
          </div>
        </div>
      </div>
      <div class="pie-legend">
        ${byDisc.map(x=>`
          <div class="pl-row">
            <span class="pl-name" style="color:${x.d.color}">${x.d.short}</span>
            <span class="pl-line"></span>
            <span class="pl-time">${fmtH(x.m)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

    <tbody>

// ════════ EVOLUÇÃO MENSAL ATÉ A PROVA ════════
// 3 linhas: tempo de estudo, questões certas (verde), questões erradas (vermelho)
// filtros das séries do gráfico de evolução
let evoFilter={tempo:true, acertos:true, erros:true};
function renderEvolucao(){
  // monta os meses de TODAY até PROVA (inclusive)
  const months=[];
  let cur=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
  const end=new Date(PROVA.getFullYear(),PROVA.getMonth(),1);
  while(cur<=end){ months.push(new Date(cur)); cur.setMonth(cur.getMonth()+1); }
  const MNABR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  // agrega por mês
  const dataM=months.map(mo=>{
    const ms=S.sessions.filter(s=>{ const d=parseBRDate(s.date); return d.getMonth()===mo.getMonth()&&d.getFullYear()===mo.getFullYear(); });
    const minutes=ms.reduce((a,b)=>a+b.minutes,0);
    const qr=ms.reduce((a,b)=>a+(b.qr||0),0);
    const qe=ms.reduce((a,b)=>a+((b.q||0)-(b.qr||0)),0);
    return {mo,minutes,qr,qe};
  });

  const anyData=dataM.some(d=>d.minutes>0||d.qr>0||d.qe>0);
  if(!anyData){
    return `<div class="empty-state" style="padding:30px"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div>Sem dados ainda.<br>Seus registros vão desenhar a evolução mês a mês até a prova.</div></div>`;
  }

  // índice do último mês com qualquer registro — as linhas param aqui
  let lastIdx=0;
  dataM.forEach((d,i)=>{ if(d.minutes>0||d.qr>0||d.qe>0) lastIdx=i; });

  const W=380,H=300,padL=34,padR=40,padT=16,padB=40;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const n=months.length;
  const xOf=i=> n<=1 ? padL+plotW/2 : padL + (plotW*i/(n-1));

  // escalas: questões (esquerda) e tempo em horas (direita)
  const maxQ=Math.max(1,...dataM.map(d=>Math.max(d.qr,d.qe)));
  const maxHoras=Math.max(1,...dataM.map(d=>d.minutes/60));
  const yQ=v=> padT+plotH-(v/maxQ*plotH);
  const yH=v=> padT+plotH-(v/maxHoras*plotH);

  // grade horizontal
  let grid='';
  for(let g=0;g<=4;g++){
    const y=padT+plotH/4*g;
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${cssVar('--grid')}" stroke-width="1"/>`;
    const qv=Math.round(maxQ*(4-g)/4);
    const hv=Math.round(maxHoras*(4-g)/4);
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="${cssVar('--ink2')}" font-family="JetBrains Mono">${qv}</text>`;
    grid+=`<text x="${W-padR+5}" y="${(y+3).toFixed(1)}" text-anchor="start" font-size="9" fill="${cssVar('--ink2')}" font-family="JetBrains Mono">${hv}h</text>`;
  }

  // rótulos dos meses (eixo X) — abrevia se muitos
  let xlabels='';
  const step = n>8 ? 2 : 1;
  months.forEach((mo,i)=>{
    if(i%step!==0 && i!==n-1) return;
    xlabels+=`<text x="${xOf(i).toFixed(1)}" y="${H-14}" text-anchor="middle" font-size="11" font-weight="600" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">${MNABR[mo.getMonth()].toUpperCase()}</text>`;
  });

  // desenha a linha suave (catmull-rom) apenas até lastIdx
  function linePath(getY, valOf){
    const pts=[];
    for(let i=0;i<=lastIdx;i++){ pts.push({x:xOf(i), y:getY(valOf(dataM[i]))}); }
    if(pts.length===0) return '';
    if(pts.length===1) return `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    let d=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(0,i-1)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(pts.length-1,i+2)];
      const c1x=p1.x+(p2.x-p0.x)/6, c1y=p1.y+(p2.y-p0.y)/6;
      const c2x=p2.x-(p3.x-p1.x)/6, c2y=p2.y-(p3.y-p1.y)/6;
      d+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
    }
    return d;
  }
  function dotsFor(getY, valOf, color){
    let out='';
    for(let i=0;i<=lastIdx;i++){
      const v=valOf(dataM[i]);
      out+=`<circle cx="${xOf(i).toFixed(1)}" cy="${getY(v).toFixed(1)}" r="3" fill="${color}" stroke="${cssVar('--card')}" stroke-width="1.5"/>`;
    }
    return out;
  }

  const COL_TIME=cssVar('--brand')||'#5b3df5', COL_OK='#16b981', COL_ERR='#ef4444';
  let lines='', dots='';
  if(evoFilter.acertos){
    lines+=`<path d="${linePath(yQ,d=>d.qr)}" fill="none" stroke="${COL_OK}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    dots+=dotsFor(yQ,d=>d.qr,COL_OK);
  }
  if(evoFilter.erros){
    lines+=`<path d="${linePath(yQ,d=>d.qe)}" fill="none" stroke="${COL_ERR}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    dots+=dotsFor(yQ,d=>d.qe,COL_ERR);
  }
  if(evoFilter.tempo){ // desenhado por último → fica por cima, sempre visível
    lines+=`<path d="${linePath(yH,d=>d.minutes/60)}" fill="none" stroke="${COL_TIME}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    dots+=dotsFor(yH,d=>d.minutes/60,COL_TIME);
  }

  // totais p/ legenda (filtros clicáveis)
  const totH=fmtH(dataM.reduce((a,b)=>a+b.minutes,0));
  const totOk=dataM.reduce((a,b)=>a+b.qr,0);
  const totErr=dataM.reduce((a,b)=>a+b.qe,0);

  return `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">
      ${grid}
      ${lines}
      ${dots}
      ${xlabels}
      <text x="${padL+2}" y="${padT-5}" text-anchor="start" font-size="10" font-weight="600" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">Questões</text>
      <text x="${W-padR-2}" y="${padT-5}" text-anchor="end" font-size="10" font-weight="600" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">Horas</text>
    </svg>
    <div class="evo-legend">
      <button class="evo-leg${evoFilter.tempo?' on':''}" data-evo="tempo" style="--lc:${COL_TIME}">Tempo: ${totH}</button>
      <button class="evo-leg${evoFilter.acertos?' on':''}" data-evo="acertos" style="--lc:${COL_OK}">Acertos: ${totOk}</button>
      <button class="evo-leg${evoFilter.erros?' on':''}" data-evo="erros" style="--lc:${COL_ERR}">Erros: ${totErr}</button>
    </div>`;
}

}

// ════════ CICLO ════════
// donut do ciclo: cada matéria é uma seção (proporcional ao peso) com o nome dentro
function cicloDonut(){
  const size=300, cx=size/2, cy=size/2, stroke=58, midR=size/2-stroke/2-4;
  const rOut=midR+stroke/2, rIn=midR-stroke/2, TAU=Math.PI*2, cornerRatio=0.18;
  const totW=DISC.reduce((s,d)=>s+(d.peso||1),0)||1, gap=8/midR;
  const P=(R,a)=>`${(cx+R*Math.cos(a)).toFixed(3)} ${(cy+R*Math.sin(a)).toFixed(3)}`;
  function seg(a0,a1,color){
    let cr=Math.min(stroke*cornerRatio, rOut*(a1-a0)*0.42); if(cr<0.1) cr=0.1;
    const dOut=cr/rOut, dIn=cr/rIn, oa0=a0+dOut, oa1=a1-dOut, ia0=a0+dIn, ia1=a1-dIn;
    const laOut=(oa1-oa0)>Math.PI?1:0, laIn=(ia1-ia0)>Math.PI?1:0;
    return `<path d="M ${P(rOut,oa0)} A ${rOut} ${rOut} 0 ${laOut} 1 ${P(rOut,oa1)} `
      +`Q ${P(rOut,a1)} ${P(rOut-cr,a1)} L ${P(rIn+cr,a1)} Q ${P(rIn,a1)} ${P(rIn,ia1)} `
      +`A ${rIn} ${rIn} 0 ${laIn} 0 ${P(rIn,ia0)} Q ${P(rIn,a0)} ${P(rIn+cr,a0)} `
      +`L ${P(rOut-cr,a0)} Q ${P(rOut,a0)} ${P(rOut,oa0)} Z" fill="${color}"/>`;
  }
  let raw=[], acc=-Math.PI/2;
  DISC.forEach(d=>{ const slice=((d.peso||1)/totW)*TAU; raw.push([acc,acc+slice,d]); acc+=slice; });
  let segs='', labels='', defs='';
  raw.forEach(([a0,a1,d],i)=>{
    const slice=a1-a0, eff=Math.min(gap, slice*0.5), sa=a0+eff/2, sb=a1-eff/2;
    segs+=seg(sa,sb,d.color);
    const mid=(a0+a1)/2, bottom=Math.sin(mid)>0;
    const pa=bottom?sb:sa, pb=bottom?sa:sb;
    const large=Math.abs(pb-pa)>Math.PI?1:0, sweep=bottom?0:1;
    const lbl=SIGLA[d.id]||d.short.slice(0,3).toUpperCase();
    const arcLen=midR*(sb-sa), fs=Math.min(13, Math.max(8, arcLen/(lbl.length*0.62)));
    defs+=`<path id="cpath${i}" d="M ${P(midR,pa)} A ${midR} ${midR} 0 ${large} ${sweep} ${P(midR,pb)}" fill="none"/>`;
    labels+=`<text font-size="${fs.toFixed(1)}" font-weight="800" fill="#15233b"><textPath href="#cpath${i}" startOffset="50%" text-anchor="middle">${lbl}</textPath></text>`;
  });
  return `<svg width="100%" height="100%" viewBox="0 0 ${size} ${size}"><defs>${defs}</defs>${segs}${labels}</svg>`;
}

let semanaOffset=0; // deslocamento de semanas na guia Semana
let semWin=Math.min(TODAY.getDay(),4);  // início da janela de 3 dias no celular (0..4); padrão = janela de hoje
// intervalos de revisão espaçada (em dias após o estudo da teoria)
const REVISAO_INTERVALOS=[1,3,7,15,30,45,60];
// rótulo de qual revisão é (1ª, 2ª, ...)
function revisaoNumeros(){ return ['1ª','2ª','3ª','4ª','5ª','6ª','7ª','8ª','9ª']; }
// gera todas as revisões devidas, agrupadas por data (chave dd/mm/aaaa)
function buildRevisoesAgendadas(){
  // cada sessão de TEORIA gera uma série de revisões
  const porData={}; // "dd/mm/aaaa" -> [{disc, ordem, baseDate}]
  S.sessions.filter(s=>s.tipo==='th').forEach(s=>{
    const base=parseBRDate(s.date);
    let acumulado=0;
    REVISAO_INTERVALOS.forEach((iv,idx)=>{
      acumulado=iv; // intervalo é contado a partir do estudo original
      const due=new Date(base); due.setDate(base.getDate()+iv);
      const key=dateKeyBR(due);
      (porData[key]=porData[key]||[]).push({disc:s.disc, ordem:idx, baseDate:s.date});
    });
    // revisões recorrentes além da 7ª: a cada 60 dias
    for(let n=1;n<=6;n++){
      const due=new Date(base); due.setDate(base.getDate()+60+n*60);
      const key=dateKeyBR(due);
      (porData[key]=porData[key]||[]).push({disc:s.disc, ordem:REVISAO_INTERVALOS.length-1+n, baseDate:s.date});
    }
  });
  // revisões programadas manualmente (Programar revisões no modal)
  (S.revManual||[]).forEach(r=>{
    (porData[r.date]=porData[r.date]||[]).push({disc:r.disc, ordem:0, baseDate:r.base, manual:true});
  });
  return porData;
}
function buildWeekPlan(){
  // Escala 12x36 + emprego 1, distribuída sobre a semana real (dom-sáb)
  const wd=weekDays(semanaOffset); // 7 datas reais
  const DOWNAMES=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const pos=S.cyclePos%CYCLE.length;
  let ci=pos;
  const revAgenda=buildRevisoesAgendadas();
  const REVNUM=revisaoNumeros();
  // jornada por dia da semana (0=Dom): segue a escala do usuário
  const jornadaDow=['turno','emp1+turno','emp1','emp1+turno','emp1','emp1+turno','folga'];
  const days=wd.map((date,idx)=>{
    const dow=date.getDay();
    const jornada=jornadaDow[dow];
    const tasks=[];
    // REVISÕES AGENDADAS para este dia (repetição espaçada baseada no que já foi estudado)
    const revsHoje=revAgenda[dateKeyBR(date)]||[];
    revsHoje.forEach(r=>{
      const d=DMAP[r.disc]; if(!d) return;
      const ord=REVNUM[r.ordem]||((r.ordem+1)+'ª');
      tasks.push({disc:d, tipo:'rv', isRev:true, h:'0h30min', revOrdem:ord, revBase:r.baseDate});
    });
    // tarefas de estudo conforme a configuração de Metas pomodoro do período desta data
    const cfg=pomoMetas()[pomoMetaIndexForDate(date)];
    const wmin=cfg.work||25, mat=cfg.blocks||1;
    const wh=Math.floor(wmin/60), wm=wmin%60, hstr=wh+'h'+(wm<10?'0'+wm:wm)+'min';
    const TPAT=['th','ex','th','ex','rv'];
    allocateBlocks(date,mat).forEach((id,b)=>{ tasks.push({disc:DMAP[id],tipo:TPAT[b%TPAT.length],h:hstr}); });
    return {dn:DOWNAMES[dow], dd:date.getDate(), date, tasks, jornada};
  });
  return days;
}

// mini-calendário mensal do mês da semana exibida
function renderMiniCal(weekDates){
  const ref=weekDates[3]; // quarta como referência do mês
  const y=ref.getFullYear(), m=ref.getMonth();
  const MNABR=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  const fmtR=d=>d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
  // conjunto de dias destacados (a semana exibida)
  const weekSet=new Set(weekDates.map(d=>d.toDateString()));
  const first=new Date(y,m,1);
  const firstDow=first.getDay(); // 0=Dom
  const last=new Date(y,m+1,0).getDate();
  const prevLast=new Date(y,m,0).getDate();
  const cells=[];
  // dias do mês anterior para preencher
  for(let i=firstDow-1;i>=0;i--) cells.push({d:prevLast-i, off:true, date:new Date(y,m-1,prevLast-i)});
  for(let d=1;d<=last;d++) cells.push({d, off:false, date:new Date(y,m,d)});
  while(cells.length%7!==0){ const d=cells.length-(firstDow+last)+1; cells.push({d, off:true, date:new Date(y,m+1,d)}); }

  const isoOf=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;

  return `
  <div class="minical">
    <div class="mc-head">
      <span class="mc-month">${MNABR[m]}.</span>
      <div class="mc-nav">
        <button class="mc-arrow" id="mcPrev" title="Semana anterior"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <span class="mc-range">${fmtR(weekDates[0])} ~ ${fmtR(weekDates[6])}</span>
        <button class="mc-arrow" id="mcNext" title="Próxima semana"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
    <div class="mc-grid">
      ${['D','S','T','Q','Q','S','S'].map(x=>`<div class="mc-dow">${x}</div>`).join('')}
      ${cells.map(c=>{
        const inWeek=weekSet.has(c.date.toDateString());
        const today=sameDay(c.date,TODAY);
        let cls='mc-day';
        if(c.off) cls+=' mc-off';
        if(inWeek) cls+=' mc-inweek';
        if(today) cls+=' mc-today';
        return `<div class="${cls}" data-calsel="${isoOf(c.date)}">${c.d}</div>`;
      }).join('')}
    </div>
    ${semanaOffset!==0?`<button class="mc-today-btn" id="mcToday"><svg viewBox="0 0 24 24" fill="none" style="width:13px;height:13px"><path d="M3 10h18M7 3v3M17 3v3M5 5h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="15" r="2" fill="currentColor"/></svg> Voltar para hoje</button>`:''}
  </div>`;
}

  const L=CYCLE.length; let guard=0;
  while(guard<L){
    const id=CYCLE[((ci%L)+L)%L];
    if(isDiscActiveOn(id,date)) return {id,ci};
    ci++; guard++;
  }
  return {id:CYCLE[((ci%L)+L)%L], ci}; // nenhuma ativa ainda: usa a posição original
}
function cicloDayNumber(date){ const ep=new Date(2026,0,1); ep.setHours(0,0,0,0); const d=new Date(date); d.setHours(0,0,0,0); return Math.floor((d-ep)/86400000); }
// distribui os blocos do dia entre as matérias ATIVAS, respeitando a ordem do ciclo e o peso
function allocateBlocks(date,nBlocks){
  const active=cycleOrder().filter(id=>isDiscActiveOn(id,date));
  if(!active.length || nBlocks<=0) return [];
  if(nBlocks<active.length){
    // menos blocos que matérias: a janela gira pelos dias (cobre todas no ciclo), exibida na ordem
    const start=((cicloDayNumber(date)*nBlocks)%active.length+active.length)%active.length;
    const idxs=[];
    for(let k=0;k<nBlocks;k++) idxs.push((start+k)%active.length);
    idxs.sort((a,b)=>a-b);
    return idxs.map(i=>active[i]);
  }
  // blocos suficientes: todas recebem 1 (na ordem); o excedente é distribuído por peso (maior resto)
  const counts={}; active.forEach(id=>counts[id]=1);
  let rem=nBlocks-active.length;
  if(rem>0){
    const w=active.map(id=>Math.max(1,(DMAP[id]&&DMAP[id].peso)||1));
    const totW=w.reduce((a,b)=>a+b,0);
    const extra=active.map((id,i)=>({id, ideal:rem*w[i]/totW, add:0, idx:i}));
    extra.forEach(e=>{ e.add=Math.floor(e.ideal); });
    let left=rem-extra.reduce((s,e)=>s+e.add,0);
    extra.slice().sort((a,b)=>((b.ideal-Math.floor(b.ideal))-(a.ideal-Math.floor(a.ideal)))||(a.idx-b.idx))
      .forEach(e=>{ if(left>0){ e.add++; left--; } });
    let gi=0; while(left>0){ extra[gi%extra.length].add++; left--; gi++; }
    extra.forEach(e=>counts[e.id]+=e.add);
  }
  // sequência na "Ordem no ciclo": blocos de cada matéria agrupados, na ordem definida
  const seq=[];
  active.forEach(id=>{ for(let k=0;k<counts[id];k++) seq.push(id); });
  return seq;
}
function dayStudyBlocks(date){
  const cfg=pomoMetas()[pomoMetaIndexForDate(date)];
  const wmin=cfg.work||25, nBlocks=cfg.blocks||1;
  const wh=Math.floor(wmin/60), wm=wmin%60, hstr=wh+'h'+(wm<10?'0'+wm:wm)+'min';
  const TPAT=['th','ex','th','ex','rv'];
  return allocateBlocks(date,nBlocks).map((id,b)=>({disc:DMAP[id],tipo:TPAT[b%TPAT.length],h:hstr,min:wmin}));
}
// agrega os blocos do dia por matéria: [{disc,min,n,tipo}]
function dayMateriaSummary(date){
  const by={};
  dayStudyBlocks(date).forEach(b=>{ const k=b.disc.id; (by[k]=by[k]||{disc:b.disc,min:0,n:0,tipo:b.tipo}); by[k].min+=b.min; by[k].n++; });
  return Object.values(by);
}
function calTaskForDate(date){
  const d=date.getDate();
  const ci=(S.cyclePos + (d-1));
  const dow=(date.getDay()+6)%7;
  const cfg=pomoMetas()[pomoMetaIndexForDate(date)];
  const totMin=(cfg.work||25)*(cfg.materias||1);
  const th=Math.floor(totMin/60),tm=totMin%60,hstr=th+'h'+(tm?(tm<10?'0'+tm:tm)+'min':'');
  const disc=DMAP[pickActiveDisc(ci,date).id];
  const tipo=['th','th','th','rv','ex','th','rv'][dow];
  return {disc,tipo,h:hstr,mat:cfg.materias};
}

function renderCal(){

  if(mobile){ semWin=Math.max(0,Math.min(4,semWin)); } else { semWin=0; }

  for(let i=firstDow-1;i>=0;i--) cells.push({date:new Date(cY,cM-1,prevLast-i),off:true});
  for(let d=1;d<=last;d++) cells.push({date:new Date(cY,cM,d),off:false});

  const taskOf={};
  for(let d=1;d<=last;d++){
    const date=new Date(cY,cM,d);
    taskOf[d]=dayMateriaSummary(date);
  }

  const canNext = true; // navegação liberada também para datas futuras

      ${cells.map(c=>{
        const inWeek=weekSet.has(c.date.toDateString());
        const today=sameDay(c.date,TODAY);
        const dn=c.date.getDate();
        let cls='cal-cell';
        if(c.off) cls+=' cal-off';
        if(inWeek) cls+=' cal-inweek';
        if(today) cls+=' cal-today-cell';
        if(c.off) return `<div class="${cls}" data-calsel="${isoOf(c.date)}"><div class="cal-dnum">${dn}</div></div>`;
        const list=taskOf[dn]||[];
        const fmtMin=v=>v>=60?fmtH(v):v+'min';

      <div style="display:flex;align-items:center;gap:6px"><span style="width:12px;height:4px;border-radius:2px;background:var(--rv);display:inline-block"></span>Revisão</div>

    </div>

  </div>
  <div id="semanaMount"></div>`;

  // navegação: no celular avança 3 dias por vez; no desktop, por semana
  document.getElementById('calPrev').addEventListener('click',()=>{
    if(mobile){
      if(semWin>0){ semWin=Math.max(0,semWin-3); }
      else { semanaOffset--; semWin=4; }
    } else { semanaOffset--; semWin=0; }
    renderCal();
  });
  const cn=document.getElementById('calNext');
  if(cn && canNext) cn.addEventListener('click',()=>{
    if(mobile){
      if(semWin<4){ semWin=Math.min(4,semWin+3); }

  const ct=document.getElementById('calToday');
  if(ct) ct.addEventListener('click',()=>{ semanaOffset=0; semWin=mobile?Math.min(TODAY.getDay(),4):0; renderCal(); });

  // clique no dia seleciona a semana daquele dia (e a janela de 3 dias no celular)
  el.querySelectorAll('.cal-grid [data-calsel]').forEach(c=>c.addEventListener('click',()=>{
    const iso=c.dataset.calsel;
    const [y,m,d]=iso.split('-').map(Number); const target=new Date(y,m-1,d);
    const baseSun=new Date(TODAY); baseSun.setDate(TODAY.getDate()-TODAY.getDay());
    const tgtSun=new Date(target); tgtSun.setDate(target.getDate()-target.getDay());
    let off=Math.round((tgtSun-baseSun)/(7*86400000));
    semanaOffset=off; semWin=Math.min(target.getDay(),4); renderCal();
    showCalDay(iso); // mostra o estudo programado do dia clicado
  }));

  renderSemana(); // quadro semanal montado abaixo
}

function wireCicloOrderCard(){
  function move(id,dir){
    const arr=cycleOrder().slice();
    const i=arr.indexOf(id); if(i<0) return;
    const j=i+dir; if(j<0||j>=arr.length) return;
    // FLIP — First: guarda as posições atuais dos cards
    const first={};
    document.querySelectorAll('.cfg-tile[data-mat]').forEach(t=>{ first[t.dataset.mat]=t.getBoundingClientRect(); });
    // aplica a nova ordem e re-renderiza (Last)
    [arr[i],arr[j]]=[arr[j],arr[i]];
    S.cycleOrder=arr; rebuildCycle(); save(); renderMetas();
    // Invert: desloca cada card de volta para a posição antiga (sem transição)
    const tiles=document.querySelectorAll('.cfg-tile[data-mat]');
    tiles.forEach(t=>{
      const f=first[t.dataset.mat]; if(!f) return;
      const l=t.getBoundingClientRect();
      const dx=f.left-l.left, dy=f.top-l.top;
      if(dx||dy){ t.style.transition='none'; t.style.transform=`translate(${dx}px,${dy}px)`; t.style.zIndex='5'; }
    });
    // Play: anima até a posição definida
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      tiles.forEach(t=>{
        if(!t.style.transform) return;
        t.style.transition='transform .34s cubic-bezier(.4,0,.2,1)';
        t.style.transform='';
        t.addEventListener('transitionend',()=>{ t.style.transition=''; t.style.zIndex=''; },{once:true});
      });
    }));
  }
  document.querySelectorAll('[data-cyc-up]').forEach(b=>b.addEventListener('click',()=>move(b.dataset.cycUp,-1)));
  document.querySelectorAll('[data-cyc-down]').forEach(b=>b.addEventListener('click',()=>move(b.dataset.cycDown,+1)));
}

// ── Card "Metas pomodoro": 5 donuts configuráveis (estilo do donut "Tempo de estudo") ──
// Cada seção do anel = um bloco de foco com a sua pausa; centro = horas líquidas (só foco).
function pomoDonut(cfg){
  const blocks=pomoMetaBlocks(cfg);
  const gross=blocks.reduce((a,b)=>a+b.min,0)||1;
  const size=150, cx=size/2, cy=size/2, stroke=20, midR=size/2-stroke/2-2;
  const rOut=midR+stroke/2, rIn=midR-stroke/2, TAU=Math.PI*2, cornerRatio=0.32;
  const gap=6/midR;        // vão uniforme entre todas as seções (proporcional ao anel)
  const P=(R,a)=>`${(cx+R*Math.cos(a)).toFixed(3)} ${(cy+R*Math.sin(a)).toFixed(3)}`;
  function seg(a0,a1,color){
    let cr=Math.min(stroke*cornerRatio, rOut*(a1-a0)*0.42); if(cr<0.1) cr=0.1;
    const dOut=cr/rOut, dIn=cr/rIn, oa0=a0+dOut, oa1=a1-dOut, ia0=a0+dIn, ia1=a1-dIn;
    const laOut=(oa1-oa0)>Math.PI?1:0, laIn=(ia1-ia0)>Math.PI?1:0;
    return `<path d="M ${P(rOut,oa0)} A ${rOut} ${rOut} 0 ${laOut} 1 ${P(rOut,oa1)} `
      +`Q ${P(rOut,a1)} ${P(rOut-cr,a1)} L ${P(rIn+cr,a1)} Q ${P(rIn,a1)} ${P(rIn,ia1)} `
      +`A ${rIn} ${rIn} 0 ${laIn} 0 ${P(rIn,ia0)} Q ${P(rIn,a0)} ${P(rIn+cr,a0)} `
      +`L ${P(rOut-cr,a0)} Q ${P(rOut,a0)} ${P(rOut,oa0)} Z" fill="${color}"/>`;
  }
  // ângulos crus (cumulativos) de cada bloco; cada seção recua metade do vão em cada lado
  let raw=[], acc=-Math.PI/2;
  blocks.forEach(b=>{ const slice=(b.min/gross)*TAU; raw.push([acc,acc+slice]); acc+=slice; });
  let svg='';
  blocks.forEach((b,i)=>{
    const slice=raw[i][1]-raw[i][0];
    const eff=Math.min(gap, slice*0.6);
    let a0=raw[i][0]+eff/2, a1=raw[i][1]-eff/2;
    if(a1<=a0){ const m=(raw[i][0]+raw[i][1])/2; a0=m-0.004; a1=m+0.004; }
    svg+=seg(a0,a1,POMO_COLORS[b.type]);
  });
  return `<svg width="100%" height="100%" viewBox="0 0 ${size} ${size}">${svg}</svg>`;
}

      ${stepRow('blocks','Blocos de foco','no-line')}

        <div class="cfg-box-h">Tempos</div>
        ${stepRow('work','Estudo (foco) · min')}
        ${stepRow('short','Pausa curta · min')}
        ${stepRow('long','Pausa longa · min')}
      </div>
      ${stepRow('materias','Quantidade de matérias')}
      <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px" id="pmSave">Salvar</button>

    body.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',()=>{ const k=b.dataset.inc; tmp[k]=Math.min(LIM[k][1],tmp[k]+LIM[k][2]); render(); }));
    document.getElementById('pmSave').addEventListener('click',()=>{ pomoMetas()[i]={...tmp}; save(); closeModal(); renderMetas(); });

  render();

// ── Card "Evolução": linhas de tempo/questões realizadas (verde) vs meta (vermelho) ──
let evoPeriod='semana', evoMode='tempo';
function renderEvo(){
  const cont=document.getElementById('evoChart'); if(!cont) return;
  const DOW=['DOM','SEG','TER','QUA','QUI','SEX','SAB'];
  let buckets=[], labelEvery=1;
  if(evoPeriod==='semana'){
    weekDays(0).forEach(d=>buckets.push({label:DOW[d.getDay()], date:new Date(d), days:1, match:s=>sameDay(parseBRDate(s.date),d)}));
  } else if(evoPeriod==='mes'){ // Janeiro a Dezembro do ano atual (evolução conforme metas pomodoro)
    const y=TODAY.getFullYear();
    for(let m=0;m<12;m++){ const dim=new Date(y,m+1,0).getDate();
      buckets.push({label:MN_AB3[m], date:new Date(y,m,15), days:dim, match:s=>{const sd=parseBRDate(s.date);return sd.getMonth()===m&&sd.getFullYear()===y;}});
    }
    labelEvery=1;
  } else { // total: todos os meses até o dia da prova
    let startM=new Date(TODAY.getFullYear(),TODAY.getMonth(),1);
    if(S.goals.horasDiaInicio){ const hs=new Date(S.goals.horasDiaInicio+'T00:00:00'), hm=new Date(hs.getFullYear(),hs.getMonth(),1); if(hm<startM) startM=hm; }
    S.sessions.forEach(s=>{ const d=parseBRDate(s.date); const fd=new Date(d.getFullYear(),d.getMonth(),1); if(fd<startM) startM=fd; });
    const endM=new Date(PROVA.getFullYear(),PROVA.getMonth(),1);
    let cur=new Date(startM);
    while(cur<=endM){ const cy=cur.getFullYear(), cm=cur.getMonth(), dim=new Date(cy,cm+1,0).getDate();
      buckets.push({label:MN_AB3[cm], date:new Date(cy,cm,15), days:dim, match:s=>{const sd=parseBRDate(s.date);return sd.getMonth()===cm&&sd.getFullYear()===cy;}});
      cur.setMonth(cur.getMonth()+1);
    }
    labelEvery=buckets.length>14?2:1;
  }
  const N=buckets.length, isTempo=evoMode==='tempo';
  const data=buckets.map(bk=>{
    const sess=S.sessions.filter(bk.match);
    const minutes=sess.reduce((a,b)=>a+b.minutes,0), q=sess.reduce((a,b)=>a+(b.q||0),0);
    const realVal=isTempo?minutes:q;
    const metaVal=isTempo ? metaHorasDiaPomodoro(bk.date)*bk.days : metaQuestoes(bk.date)/7*bk.days;
    return {realVal, metaVal};
  });
  if(!data.some(d=>d.realVal>0||d.metaVal>0)){
    cont.innerHTML=`<div class="empty-state" style="padding:30px"><svg viewBox="0 0 24 24" fill="none"><path d="M3 17l6-6 4 4 8-8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div>Sem dados ainda. Registre estudos e defina suas metas para ver a evolução.</div></div>`;
    return;
  }
  const maxVal=Math.max(1, ...data.map(d=>Math.max(d.realVal,d.metaVal)))*1.1;
  const W=Math.max(360,Math.min(1400,Math.round(cont.clientWidth||700)));
  const H=300, padL=44, padR=18, padT=18, padB=30;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const xOf=i=> N<=1?padL+plotW/2:padL+plotW*i/(N-1);
  const yOf=v=> padT+plotH-(v/maxVal*plotH);
  let grid='';
  for(let g=0;g<=4;g++){ const y=padT+plotH/4*g;
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${cssVar('--grid')}" stroke-width="1"/>`;
    const lv=maxVal*(4-g)/4, lbl=isTempo?fmtH(Math.round(lv)):Math.round(lv);
    grid+=`<text x="${padL-5}" y="${(y+3).toFixed(1)}" text-anchor="end" font-size="9" fill="${cssVar('--ink2')}" font-family="JetBrains Mono">${lbl}</text>`;
  }
  let xlabels='';
  buckets.forEach((bk,i)=>{ if(labelEvery>1 && i%labelEvery!==0 && i!==N-1) return;
    xlabels+=`<text x="${xOf(i).toFixed(1)}" y="${H-10}" text-anchor="middle" font-size="11" font-weight="600" fill="${cssVar('--ink2')}" font-family="Plus Jakarta Sans">${bk.label}</text>`; });
  function smooth(valOf){
    const pts=data.map((d,i)=>({x:xOf(i),y:yOf(valOf(d))}));
    if(pts.length===1) return `M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    let dd=`M ${pts[0].x.toFixed(1)} ${pts[0].y.toFixed(1)}`;
    for(let i=0;i<pts.length-1;i++){ const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
      const c1x=p1.x+(p2.x-p0.x)/6,c1y=p1.y+(p2.y-p0.y)/6,c2x=p2.x-(p3.x-p1.x)/6,c2y=p2.y-(p3.y-p1.y)/6;
      dd+=` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`; }
    return dd;
  }
  function dotsFor(valOf,color){ let o=''; data.forEach((d,i)=>{ o+=`<circle cx="${xOf(i).toFixed(1)}" cy="${yOf(valOf(d)).toFixed(1)}" r="3" fill="${color}" stroke="${cssVar('--card')}" stroke-width="1.5"/>`; }); return o; }
  const GREEN='#16b981', RED='#ef4444';
  const lines=`<path d="${smooth(d=>d.metaVal)}" fill="none" stroke="${RED}" stroke-width="2.5" stroke-dasharray="5 4" stroke-linecap="round" stroke-linejoin="round"/>`
    +`<path d="${smooth(d=>d.realVal)}" fill="none" stroke="${GREEN}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`;
  const dots=dotsFor(d=>d.realVal,GREEN);
  const totReal=data.reduce((a,b)=>a+b.realVal,0), totMeta=Math.round(data.reduce((a,b)=>a+b.metaVal,0));
  const fmtV=v=>isTempo?fmtH(Math.round(v)):v;
  cont.innerHTML=`
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">${grid}${lines}${dots}${xlabels}</svg>
    <div class="evo-legend">
      <button class="evo-leg on" style="--lc:${GREEN}">${isTempo?'Estudado':'Resolvidas'}: ${fmtV(totReal)}</button>
      <button class="evo-leg on" style="--lc:${RED}">Meta: ${fmtV(totMeta)}</button>
    </div>`;
}

function simScore(s){ return (s.acertos||0)-(s.erros||0); }            // pontuação líquida
function simPct(s){ const t=s.total||((s.acertos||0)+(s.brancos||0)+(s.erros||0)); return t?Math.round((s.acertos||0)/t*100):0; }
function simTotal(s){ return s.total||((s.acertos||0)+(s.brancos||0)+(s.erros||0)); }
function pctColor(p){ return p>=80?'var(--green)':p>=60?'var(--amber)':'var(--pink)'; }

function renderSimChart(ordered){
  const cont=document.getElementById('simChart');
  if(!cont) return;
  if(ordered.length===0){ cont.innerHTML=''; return; }
  const isP=simChartMode==='pontuacao';
  const vals=ordered.map(s=>isP?simScore(s):simPct(s));
  const W=Math.max(360,Math.min(1400,Math.round(cont.clientWidth||700)));
  const H=240, padL=8, padR=8, padT=24, padB=18;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxV=Math.max(1,...vals), minV=Math.min(0,...vals);
  const range=(maxV-minV)||1;
  const n=ordered.length;
  const xOf=i=> n===1? W/2 : padL+plotW*i/(n-1);
  const yOf=v=> padT+plotH-((v-minV)/range*plotH);
  const COL=cssVar('--blue')||'#3b82f6';
  let grid='';
  for(let g=0;g<=3;g++){ const y=padT+plotH/3*g; grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="${cssVar('--grid')}" stroke-width="1"/>`; }
  let path='', dots='', labels='';
  ordered.forEach((s,i)=>{
    const x=xOf(i), y=yOf(vals[i]);
    path+=(i===0?'M':'L')+` ${x.toFixed(1)} ${y.toFixed(1)} `;
    dots+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="4" fill="${COL}" stroke="${cssVar('--card')}" stroke-width="2"/>`;
    labels+=`<g><rect x="${(x-15).toFixed(1)}" y="${(y-21).toFixed(1)}" width="30" height="15" rx="4" fill="${COL}"/><text x="${x.toFixed(1)}" y="${(y-10).toFixed(1)}" text-anchor="middle" font-size="10" font-weight="800" fill="#fff" font-family="Plus Jakarta Sans">${isP?simScore(s):simPct(s)+'%'}</text></g>`;
  });
  const line=n>=2?`<path d="${path.trim()}" fill="none" stroke="${COL}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`:'';
  cont.innerHTML=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block">${grid}${line}${dots}${labels}</svg>`;
}

function simMateriaRowHTML(m, withLabels){

function saveSimulado(idx){
  const g=id=>document.getElementById(id).value;
  const materias=[...document.querySelectorAll('#simMatList .sim-mat-row')].map(r=>{
    const total=+r.querySelector('.sim-mat-total').value||0;
    const acertos=+r.querySelector('.sim-mat-acerto').value||0;
    const brancos=+r.querySelector('.sim-mat-branco').value||0;
    const erros=Math.max(0, total-acertos-brancos);
    return {disc:r.querySelector('.sim-mat-disc').value, total, acertos, brancos, erros};
  }).filter(m=>m.disc);
  const agg=materias.reduce((a,m)=>({total:a.total+m.total,acertos:a.acertos+m.acertos,
    brancos:a.brancos+m.brancos,erros:a.erros+m.erros}),{total:0,acertos:0,brancos:0,erros:0});
  const sim={
    name:g('simName').trim()||'Simulado',
    date:g('simDate').trim()||isoToBR(todayISO()),
    tipo:g('simTipo'),
    tempo:g('simTempo').trim(),
    total:agg.total,
    acertos:agg.acertos,
    brancos:agg.brancos,
    erros:agg.erros,
    materias,
  };
  if(idx!=null && S.simulados[idx]) S.simulados[idx]=sim;
  else S.simulados.push(sim);
  save(); closeModal(); buildNav(); renderSimulados();
}

  const el=document.getElementById('panel-hist');
  if(S.sessions.length===0){
    el.innerHTML=`<div class="card card-pad"><div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 8v5l3 2M3 12a9 9 0 1 0 3-6.7" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>

      <button class="btn btn-primary" style="margin-top:16px" onclick="openTimer()">Registrar agora</button>
    </div></div>`;
    return;
  }
  // filtro por dia

  const dateLabel = histDate ? isoToBR(histDate) : 'Todos os dias';
  const sub = histDate
    ? `${indexed.length} ${indexed.length===1?'sessão':'sessões'} em ${isoToBR(histDate)}`
    : `${S.sessions.length} sessões · ${fmtH(totalMinutes())} no total`;

  const dateCtrl=`
    <div class="hist-datectrl">
      <div class="week-nav">
        <button class="week-nav-btn" id="histPrev" title="Dia anterior"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
        <span class="week-range" id="histRange">${dateLabel}</span>
        <button class="week-nav-btn" id="histNext" title="Próximo dia"><svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
      <button class="hist-cal-btn" id="histCal" title="Escolher dia"><svg viewBox="0 0 24 24" fill="none"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      ${histDate?`<button class="hist-cal-btn" id="histClear" title="Mostrar todos"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>`:''}
    </div>`;

  const rows = indexed.length? indexed.map(({s,i})=>{const d=DMAP[s.disc];
      return `<div class="hist-row">
        <div class="hist-dot" style="background:${d.color}"></div>
        <div style="flex:1;min-width:0">
          <div class="hist-mat">${d.name}</div>
          <div class="hist-meta">${s.date}${s.q?(' · '+s.q+' questões · '+Math.round(s.qr/s.q*100)+'% acertos'):''}</div>
        </div>
        <div class="hist-tag ${TIPO_CLASS[s.tipo]}">${TIPO_LABEL[s.tipo]}</div>
        <div class="hist-time">${fmtH(s.minutes)}</div>
        <div class="hist-actions">
          <button class="hist-btn" data-edit="${i}" title="Editar registro">
            <svg viewBox="0 0 24 24" fill="none"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="hist-btn hist-btn-del" data-del="${i}" title="Excluir registro">
            <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14zM10 11v6M14 11v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>

function isoToDate(iso){ const[y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function toISO(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

function openEditSession(idx){

    <div class="timer-types" id="eTipoRow">
      <button class="tt-btn${s.tipo==='th'?' on-th':''}" data-etipo="th">Teoria</button>
      <button class="tt-btn${s.tipo==='rv'?' on-rv':''}" data-etipo="rv">Revisão</button>
      <button class="tt-btn${s.tipo==='ex'?' on-ex':''}" data-etipo="ex">Questões</button>

      <div class="field"><label>Questões certas</label><input type="number" id="eQR" value="${s.qr||0}" min="0"></div>
    </div>

    <div style="display:flex;gap:10px;margin-top:6px">

  `);

  document.querySelectorAll('[data-etipo]').forEach(b=>b.addEventListener('click',()=>{
    chosen=b.dataset.etipo;
    document.querySelectorAll('[data-etipo]').forEach(x=>{x.className='tt-btn'+(x.dataset.etipo===chosen?(' on-'+chosen):'')});

function saveEditSession(idx){
  const s=S.sessions[idx];
  if(!s) return;
  const q=+document.getElementById('eQ').value||0;
  const qr=Math.min(+document.getElementById('eQR').value||0, q);
  const mins=+document.getElementById('eMin').value||0;
  if(mins===0 && q===0){ alert('Registre tempo ou questões.'); return; }
  s.disc=document.getElementById('eDisc').value;
  s.tipo=window._editTipo?window._editTipo():s.tipo;
  s.minutes=mins;
  s.q=q;
  s.qr=qr;

function bindTimerEvents(){
  document.getElementById('tDisc').addEventListener('change',e=>{timerState.disc=e.target.value;});

      x.className='tt-btn'+(x.dataset.tt===timerState.tipo?(' on-'+timerState.tipo):'');

function bindBodyEvents(){
  const tg=document.getElementById('timerToggle');
  if(tg) tg.addEventListener('click',toggleTimer);
  const rs=document.getElementById('timerReset');
  if(rs) rs.addEventListener('click',()=>{timerState.seconds=0;updateTimerDisp();});

function fmtTimer(s){const h=String(Math.floor(s/3600)).padStart(2,'0'),m=String(Math.floor(s%3600/60)).padStart(2,'0'),ss=String(s%60).padStart(2,'0');return `${h}:${m}:${ss}`;}
function updateTimerDisp(){const el=document.getElementById('timerDisp');if(el)el.textContent=fmtTimer(timerState.seconds);}
function toggleTimer(){
  timerState.running=!timerState.running;
  const btn=document.getElementById('timerToggle');
  const PLAY='<svg viewBox="0 0 24 24" fill="none"><path d="M7 5v14l11-7z" fill="currentColor"/></svg>';
  const PAUSE='<svg viewBox="0 0 24 24" fill="none"><rect x="7" y="5" width="3.6" height="14" rx="1.2" fill="currentColor"/><rect x="13.4" y="5" width="3.6" height="14" rx="1.2" fill="currentColor"/></svg>';
  if(timerState.running){
    if(btn){ btn.innerHTML=PAUSE; btn.title='Pausar'; }
    timerState.interval=setInterval(()=>{timerState.seconds++;updateTimerDisp();},1000);
  } else {
    if(btn){ btn.innerHTML=PLAY; btn.title='Iniciar'; }
    clearInterval(timerState.interval);
  }
}
// ── seletor de data customizado (Registrar estudo) ──
let dpView={y:0,m:0};
let dpOnPick=null, dpSel=null;
function openDatePicker(opts){
  opts=opts||{};
  dpOnPick=opts.onPick||null;
  dpSel=opts.sel || (document.getElementById('tDate')?document.getElementById('tDate').value:'') || todayISO();
  dpAllowFuture=!!opts.allowFuture;
  const [Y,M]=dpSel.split('-').map(Number);
  dpView.y=Y; dpView.m=M-1;
  document.getElementById('dpOv').classList.add('open');
  renderDatePicker();
}
let dpAllowFuture=false;
function closeDatePicker(){ document.getElementById('dpOv').classList.remove('open'); dpOnPick=null; }
function renderDatePicker(){
  const MN=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DOW=['D','S','T','Q','Q','S','S'];
  const y=dpView.y, m=dpView.m;
  const sel=dpSel;
  const maxISO=todayISO();
  const firstDow=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const pad=n=>String(n).padStart(2,'0');
  const isoOf=(yy,mm,dd)=>`${yy}-${pad(mm+1)}-${pad(dd)}`;
  let cells='';
  for(let i=0;i<firstDow;i++) cells+='<div class="dp-cell off"></div>';
  for(let d=1;d<=last;d++){
    const iso=isoOf(y,m,d);
    const cls=['dp-cell'];
    if(iso===maxISO) cls.push('today');
    if(iso===sel) cls.push('sel');
    if(!dpAllowFuture && iso>maxISO) cls.push('disabled');
    cells+=`<div class="${cls.join(' ')}" data-dp="${iso}">${d}</div>`;
  }
  const canNext = dpAllowFuture || isoOf(y,m,1) < maxISO.slice(0,8)+'01';
  document.getElementById('dpBox').innerHTML=`
    <div class="dp-head">
      <button class="dp-nav" id="dpPrev"><svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <div class="dp-title">${MN[m]} de ${y}</div>
      <button class="dp-nav" id="dpNext"${canNext?'':' disabled style="opacity:.35;cursor:not-allowed"'}><svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div class="dp-dows">${DOW.map(x=>`<div class="dp-dow">${x}</div>`).join('')}</div>
    <div class="dp-grid">${cells}</div>
    <div class="dp-foot">
      <button class="dp-link" id="dpToday">Hoje</button>
      <button class="dp-link" id="dpClose">Fechar</button>
    </div>`;
  document.getElementById('dpPrev').addEventListener('click',()=>{dpView.m--;if(dpView.m<0){dpView.m=11;dpView.y--}renderDatePicker();});
  document.getElementById('dpNext').addEventListener('click',()=>{if(!canNext)return;dpView.m++;if(dpView.m>11){dpView.m=0;dpView.y++}renderDatePicker();});
  document.getElementById('dpToday').addEventListener('click',()=>pickDate(todayISO()));
  document.getElementById('dpClose').addEventListener('click',closeDatePicker);
  document.querySelectorAll('#dpBox [data-dp]').forEach(c=>c.addEventListener('click',()=>pickDate(c.dataset.dp)));
}
function pickDate(iso){
  if(dpOnPick){ const cb=dpOnPick; closeDatePicker(); cb(iso); return; }
  document.getElementById('tDate').value=iso;
  const lbl=document.getElementById('tDateLabel');
  if(lbl) lbl.textContent=isoToBR(iso);
  closeDatePicker();
}

const POMO_COLORS={work:'#ff6b57',short:'#34d399',long:'#3b82f6'};
function pomoHexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function pomoLighten(hex,amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return `rgb(${r},${g},${b})`; }
const POMO_PLAY='<svg viewBox="0 0 24 24" fill="none"><path d="M7 5v14l11-7z" fill="currentColor"/></svg>';
const POMO_PAUSE='<svg viewBox="0 0 24 24" fill="none"><rect x="7" y="5" width="3.6" height="14" rx="1.2" fill="currentColor"/><rect x="13.4" y="5" width="3.6" height="14" rx="1.2" fill="currentColor"/></svg>';
const POMO_GEAR='<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.07a1.65 1.65 0 0 0-1.08-1.51 1.65 1.65 0 0 0-1.82.33l-.05.05a2 2 0 1 1-2.83-2.83l.05-.05a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.07a1.65 1.65 0 0 0 1.51-1.08 1.65 1.65 0 0 0-.33-1.82l-.05-.05a2 2 0 1 1 2.83-2.83l.05.05a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.07a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.07a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>';
let pomo={running:false,phase:0,sec:0,interval:null,focusDone:0};
function pomoCfg(){
  if(!S.pomoCfg){ S.pomoCfg={work:25,short:5,long:15,blocks:4}; S.pomoCfgFocoV=1; }
  if(S.pomoCfg.blocks==null) S.pomoCfg.blocks=4;
  if(!S.pomoCfgFocoV){ S.pomoCfg.blocks=Math.max(1,Math.round(S.pomoCfg.blocks/2)); S.pomoCfgFocoV=1; }
  return S.pomoCfg;
}
function pomoBlocks(){ return pomoMetaBlocks(pomoCfg()); }
function pomoPhaseDur(){ return pomoBlocks()[pomo.phase].min*60; }
function pomoTotalSec(){ return pomoBlocks().reduce((a,b)=>a+b.min,0)*60; }
function pomoElapsedTotal(){ const bl=pomoBlocks(); let s=0; for(let i=0;i<pomo.phase;i++) s+=bl[i].min*60; return s+pomo.sec; }
function pomoPct(){ return Math.min(100, pomoElapsedTotal()/pomoTotalSec()*100); }
function pomoWorkSeconds(){ return pomo.focusDone + (pomoBlocks()[pomo.phase].type==='work' ? pomo.sec : 0); }
function pomoFmt(sec){ const m=Math.floor(sec/60),s=sec%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function pomoStop(){ if(pomo.interval){ clearInterval(pomo.interval); pomo.interval=null; } pomo.running=false; }
function pomoSetIcon(running){ const b=document.getElementById('pomoToggle'); if(!b) return; b.innerHTML=running?POMO_PAUSE:POMO_PLAY; b.title=running?'Pausar':'Play'; }
function pomoUpdate(){
  const bl=pomoBlocks(), total=bl.reduce((a,b)=>a+b.min,0);
  const idx=Math.min(pomo.phase,bl.length-1), blk=bl[idx], dur=blk.min*60;
  let before=0; for(let i=0;i<idx;i++) before+=bl[i].min;
  const startPct=before/total*100, endPct=(before+blk.min)/total*100;
  const p=Math.min(1, pomo.sec/dur), overall=pomoPct();
  const solid=document.getElementById('pomoSolid'), color=document.getElementById('pomoColor'), tri=document.getElementById('pomoTri'), sfill=document.getElementById('pomoSolidFill');
  if(pomo.running){
    // (a expansão/cor do bloco maximizado é controlada por pomoExpandSolid/pomoShrinkSolid)
    if(sfill){ sfill.style.background=POMO_COLORS[blk.type]; sfill.style.width=(p*100)+'%'; }
    if(color) color.style.clipPath='inset(0 0 0 0%)';
    if(tri) tri.style.left=(p*100)+'%';
  } else {
    // forma original (8 fases), cinza atrás / colorido à frente (o sólido encolhe via pomoShrinkSolid)
    if(color) color.style.clipPath=`inset(0 0 0 ${overall}%)`;
    if(tri) tri.style.left=overall+'%';
  }
  const t=document.getElementById('pomoTime'); if(t){ t.textContent=pomoFmt(pomo.sec); t.style.color=POMO_COLORS[blk.type]; }
  const ph=document.getElementById('pomoPhase'); if(ph){ const lbl=blk.type==='work'?'Foco':(blk.type==='long'?'Pausa longa':'Pausa curta'); ph.textContent=`${lbl} · ${blk.min} min`; ph.style.color=POMO_COLORS[blk.type]; }
}
function pomoSegsHTML(){ return pomoBlocks().map(b=>`<div class="pseg" style="flex:${b.min};background:${POMO_COLORS[b.type]}">${b.min>=10?b.min:''}</div>`).join(''); }
function pomoBarHTML(){
  const segs=pomoSegsHTML();
  return `    <div class="pomo-phase" id="pomoPhase"></div>
    <div class="pomo-tri-track"><div class="pomo-tri" id="pomoTri" style="left:0%"></div></div>
    <div class="pomo-bar">
      <div class="pomo-layer pomo-gray">${segs}</div>
      <div class="pomo-layer pomo-color" id="pomoColor" style="clip-path:inset(0 0 0 0%)">${segs}</div>
      <div class="pomo-solid" id="pomoSolid"><div class="pomo-solid-fill" id="pomoSolidFill"></div></div>
    </div>`;
}
function pomoTick(){
  pomo.sec++;
  if(pomo.sec>=pomoPhaseDur()){ pomo.sec=pomoPhaseDur(); pomoUpdate(); pomoPhaseEnd(); return; }
  pomoUpdate();
}
function pomoExpandSolid(){ // maximiza: começa na cor do bloco (escura) e clareia ao cobrir a barra
  const solid=document.getElementById('pomoSolid'); if(!solid) return;
  const bl=pomoBlocks(), total=bl.reduce((a,b)=>a+b.min,0), idx=Math.min(pomo.phase,bl.length-1), col=POMO_COLORS[bl[idx].type];
  let before=0; for(let i=0;i<idx;i++) before+=bl[i].min;
  const st=before/total*100, en=(before+bl[idx].min)/total*100;
  solid.style.transition='none';            // posiciona no bloco, cor viva, sem animar
  solid.classList.add('on');
  solid.style.background=col;
  solid.style.left=st+'%'; solid.style.right=(100-en)+'%';
  void solid.offsetWidth;                   // reflow
  solid.style.transition='';                // volta à transição CSS (left/right/cor)
  solid.style.background=pomoLighten(col,0.55); // clareia
  solid.style.left='0%'; solid.style.right='0%';
}
function pomoShrinkSolid(){ // minimiza: regride ao slot do bloco e escurece para a cor do bloco, depois revela a visão
  const solid=document.getElementById('pomoSolid'); if(!solid) return;
  const bl=pomoBlocks(), total=bl.reduce((a,b)=>a+b.min,0), idx=Math.min(pomo.phase,bl.length-1), col=POMO_COLORS[bl[idx].type];
  let before=0; for(let i=0;i<idx;i++) before+=bl[i].min;
  const st=before/total*100, en=(before+bl[idx].min)/total*100;
  solid.classList.add('on');               // permanece visível durante o encolhimento
  solid.style.background=col;              // escurece para a cor do bloco
  solid.style.left=st+'%'; solid.style.right=(100-en)+'%';
  setTimeout(()=>{ if(!pomo.running) solid.classList.remove('on'); }, 950); // some só após encolher
}
function pomoToggle(){
  const blocks=pomoBlocks();
  if(pomo.phase>=blocks.length) return;
  if(pomo.running){ pomoStop(); pomoSetIcon(false); pomoShrinkSolid(); pomoUpdate(); return; } // pausa -> regride lento
  if(pomo.sec>=pomoPhaseDur()) return; // fase concluída aguardando decisão
  pomo.running=true; pomoSetIcon(true); pomoExpandSolid(); pomoUpdate(); // play -> maximiza clareando
  pomo.interval=setInterval(pomoTick,1000);
}
function pomoPhaseEnd(){
  pomoStop(); pomoSetIcon(false);
  const blk=pomoBlocks()[pomo.phase];
  if(blk.type==='work') pomo.focusDone += blk.min*60;
  pomoShrinkSolid(); pomoUpdate();
  pomoShowDialog();
}
function pomoDlgClose(){ const d=document.getElementById('pomoDlgOv'); if(d) d.classList.remove('open'); }
function pomoShowDialog(){
  const blocks=pomoBlocks(), blk=blocks[pomo.phase], last=pomo.phase>=blocks.length-1;
  let msg,ok,act;
  if(last){
    msg='Ciclo concluído! 🎉<br>Clique em <b>Salvar</b> para registrar seu foco.'; ok='Concluir'; act=pomoDlgClose;
  } else if(blk.type==='work'){
    msg='Foco concluído!<br>Hora do intervalo.'; ok='Começar intervalo';
    act=()=>{ pomo.phase++; pomo.sec=0; pomoDlgClose(); pomoUpdate(); pomoToggle(); };
  } else {
    msg='Intervalo concluído!<br>Hora de focar.'; ok='Iniciar foco';
    act=()=>{ pomo.phase++; pomo.sec=0; pomoDlgClose(); pomoUpdate(); pomoToggle(); };
  }
  document.getElementById('pomoDlgBox').innerHTML=`
    <div class="pomo-dlg-msg">${msg}</div>
    <div class="sub-actions">
      <button class="btn btn-ghost" id="pomoDlgCancel">Cancelar</button>
      <button class="btn btn-primary" id="pomoDlgOk">${ok}</button>
    </div>`;
  document.getElementById('pomoDlgOv').classList.add('open');
  document.getElementById('pomoDlgOk').addEventListener('click',act);
  document.getElementById('pomoDlgCancel').addEventListener('click',pomoDlgClose);
}
function openPomodoro(){
  pomoStop(); pomo.phase=0; pomo.sec=0; pomo.focusDone=0;
  document.getElementById('subBox').innerHTML=`
    <div class="sub-title"><svg viewBox="0 0 24 24" fill="none" style="width:18px;height:18px"><path d="M5 13.5C5 9.9 8.1 7.5 12 7.5s7 2.4 7 6c0 4.2-3.1 7.5-7 7.5s-7-3.3-7-7.5z" fill="#ff6b57"/><path d="M12 7.5V5" stroke="#2eb872" stroke-width="1.6" stroke-linecap="round"/></svg>Pomodoro</div>
    ${pomoBarHTML()}
    <div class="pomo-readout"><span id="pomoTime">00:00</span></div>
    <div class="pomo-ctrls">
      <button class="pomo-btn on" id="pomoToggle" title="Play">${POMO_PLAY}</button>
      <button class="pomo-btn" id="pomoCfgBtn" title="Configurar">${POMO_GEAR}</button>
    </div>
    <div class="sub-actions">
      <button class="btn btn-ghost" id="pomoCancel">Cancelar</button>
      <button class="btn btn-primary" id="pomoSave">Salvar</button>
    </div>`;
  document.getElementById('subOv').classList.add('open');
  pomoUpdate();
  document.getElementById('pomoToggle').addEventListener('click',pomoToggle);
  document.getElementById('pomoCfgBtn').addEventListener('click',openPomoCfg);
  document.getElementById('pomoCancel').addEventListener('click',()=>{ pomoStop(); pomoDlgClose(); closeSub(); });
  document.getElementById('pomoSave').addEventListener('click',()=>{ pomoStop(); timerState.seconds+=pomoWorkSeconds(); updateTimerDisp(); pomoDlgClose(); closeSub(); });
}
function closePomoCfg(){ document.getElementById('pomoCfgOv').classList.remove('open'); }
function openPomoCfg(){
  pomoStop(); pomoSetIcon(false);
  const c=pomoCfg();
  let tmp={work:c.work,short:c.short,long:c.long,blocks:c.blocks||8};
  const LIM={blocks:[1,12,1],work:[5,90,5],short:[1,30,1],long:[5,60,5]};
  const box=document.getElementById('pomoCfgBox');
  const stepRow=(k,lbl,extra='')=>`<div class="cfg-row ${extra}"><span class="cfg-lbl">${lbl}</span><div class="stepper"><button class="step-btn" data-dec="${k}">−</button><b>${tmp[k]}</b><button class="step-btn" data-inc="${k}">+</button></div></div>`;
  const render=()=>{
    const blocks=pomoMetaBlocks(tmp);
    const focoMin=blocks.filter(b=>b.type==='work').reduce((a,b)=>a+b.min,0);
    const bar=blocks.map(b=>`<div class="pm-seg" style="flex:${b.min};background:${POMO_COLORS[b.type]}">${b.min>=10?b.min:''}</div>`).join('');
    box.innerHTML=`
      <div class="sub-title">${POMO_GEAR}Configurar pomodoro</div>
      <div style="text-transform:uppercase;color:var(--ink);font-weight:800;font-size:15px;margin-bottom:8px;text-align:center">Horas líquidas: ${fmtH(focoMin)}</div>
      <div class="pm-bar" style="margin-bottom:14px">${bar}</div>
      ${stepRow('blocks','Blocos de foco','no-line')}
      <div class="cfg-box">
        <div class="cfg-box-h">Tempos</div>
        ${stepRow('work','Estudo (foco) · min')}
        ${stepRow('short','Pausa curta · min')}
        ${stepRow('long','Pausa longa · min')}
      </div>
      <div class="sub-actions">
        <button class="btn btn-ghost" id="cfgCancel">Cancelar</button>
        <button class="btn btn-primary" id="cfgSave">Salvar</button>
      </div>`;
    box.querySelectorAll('[data-dec]').forEach(b=>b.addEventListener('click',()=>{ const k=b.dataset.dec; tmp[k]=Math.max(LIM[k][0],tmp[k]-LIM[k][2]); render(); }));
    box.querySelectorAll('[data-inc]').forEach(b=>b.addEventListener('click',()=>{ const k=b.dataset.inc; tmp[k]=Math.min(LIM[k][1],tmp[k]+LIM[k][2]); render(); }));
    document.getElementById('cfgCancel').addEventListener('click',closePomoCfg);
    document.getElementById('cfgSave').addEventListener('click',()=>{ S.pomoCfg={work:tmp.work,short:tmp.short,long:tmp.long,blocks:tmp.blocks}; save(); closePomoCfg(); openPomodoro(); });
  };
  render();
  document.getElementById('pomoCfgOv').classList.add('open');
}

function saveSession(){
  const disc=timerState.disc, tipo=timerState.tipo;
  const isEx=tipo==='ex';
  const manualMin=+(document.getElementById('tMin')?.value ?? timerState.manualMin)||0;
  const mins=manualMin || (isEx?0:Math.round(timerState.seconds/60));
  const q=isEx?(+(document.getElementById('tQ')?.value)||0):0;
  const qr=isEx?Math.min(+(document.getElementById('tQR')?.value)||0, q):0;
  if(mins===0 && q===0){ alert('Registre tempo ou questões.'); return; }
  const dateStr=isoToBR(document.getElementById('tDate').value);
  const sess={date:dateStr,disc,tipo,minutes:mins,q,qr};
  // páginas e videoaula (teoria/revisão)
  if(!isEx){
    const p=timerState.pag||{}; if(p.ini||p.fim) sess.paginas={ini:p.ini||'',fim:p.fim||''};
    const v=timerState.vid||{}; if(v.titulo||v.ini||v.fim) sess.video={titulo:v.titulo||'',ini:v.ini||'',fim:v.fim||''};
  }
  S.sessions.push(sess);

  // "Teoria finalizada": marca o item de teoria da disciplina como concluído
  if(tipo==='th' && timerState.teoriaFim){
    const d=DMAP[disc];
    if(d && d.items){ d.items.forEach((_,idx)=>{ S.studied[itemKey(disc,idx)]=true; }); }
  }

  // "Programar revisões": agenda revisões manuais nos intervalos escolhidos
  if(timerState.progRev){
    const base=parseBRDate(dateStr);
    Object.keys(timerState.revSel).forEach(dd=>{
      if(timerState.revSel[dd]){
        const due=new Date(base); due.setDate(base.getDate()+(+dd));
        S.revManual=S.revManual||[];
        S.revManual.push({disc, date:dateKeyBR(due), base:dateStr, dias:+dd});
      }
    });
  }

  if(timerState.interval) clearInterval(timerState.interval);
  save();
  closeModal();
  renderTopbar();buildNav();render(curTab);
}

// ════════ MODAL ════════
function showModal(html){ document.getElementById('modalBody').innerHTML=html; openModalEl(); }
function openModalEl(){ document.getElementById('ov').classList.add('open'); }
function closeModal(){ document.getElementById('ov').classList.remove('open'); if(timerState.interval)clearInterval(timerState.interval);timerState.running=false; }
document.getElementById('modalX').addEventListener('click',closeModal);
document.getElementById('ov').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('openTimerBtn').addEventListener('click',()=>openTimer());

// ════════ TEMA CLARO/ESCURO ════════
function currentTheme(){ return S.theme || 'light'; }
function applyTheme(t){
  if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
}
function syncThemeToggle(){
  const thumb=document.getElementById('ttThumb');
  const btn=document.getElementById('themeToggle');
  if(!btn) return;
  const dark=currentTheme()==='dark';
  btn.classList.toggle('is-dark',dark);
}
function toggleTheme(){
  S.theme=currentTheme()==='dark'?'light':'dark';
  save();
  applyTheme(S.theme);
  syncThemeToggle();
  render(curTab); // re-renderiza a guia atual para os gráficos lerem as novas cores
}

// ════════ INIT ════════
applyTheme(currentTheme());
buildNav();
renderTopbar();
syncThemeToggle();
document.getElementById('themeToggle').addEventListener('click',toggleTheme);
const _themeSide=document.getElementById('themeToggleSide'); if(_themeSide) _themeSide.addEventListener('click',toggleTheme);
S.cstView='ano'; // ao abrir a Visão geral, Constância inicia em "Ano"
render('dash');
requestAnimationFrame(()=>animatePanelCards('panel-dash'));
</script>
