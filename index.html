<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Estudo — INSS 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6fb;--card:#ffffff;--ink:#1a2233;
  --ink2:#5b6680;--line:#e6eaf2;--line2:#d4dbe8;
  --brand:#5b3df5;--brand2:#7c5cff;--brand-soft:#ece8ff;
  --green:#16b981;--green-soft:#dafaef;
  --amber:#f59e0b;--amber-soft:#fef3d6;
  --pink:#ec4899;--pink-soft:#fce4f1;
  --blue:#3b82f6;--blue-soft:#dbeafe;
  --th:#3b82f6;--rv:#a855f7;--ex:#f59e0b;--rv-soft:#f3e8ff;
  --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
  --shadow-lg:0 4px 12px rgba(20,30,60,.08),0 20px 48px rgba(20,30,60,.10);
  --grid:#eef1f7;--pie-stroke:#ffffff;
}
[data-theme="dark"]{
  --bg:#0c1018;--card:#151a24;--ink:#e6ebf3;
  --ink2:#8a98b0;--line:#222a38;--line2:#2e3848;
  --brand:#7c5cff;--brand2:#9b80ff;--brand-soft:#241d44;
  --green:#1ec98c;--green-soft:#122c24;
  --amber:#f5a623;--amber-soft:#332613;
  --pink:#ec4899;--pink-soft:#33182a;
  --blue:#4d94ff;--blue-soft:#152339;
  --th:#4d94ff;--rv:#b06aff;--ex:#f5a623;--rv-soft:#241733;
  --shadow:0 1px 3px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.25);
  --shadow-lg:0 4px 12px rgba(0,0,0,.4),0 20px 48px rgba(0,0,0,.45);
  --grid:#222a38;--pie-stroke:#151a24;
}
[data-theme="dark"] .cst-done{background:#12342544;color:#2bd89a}
[data-theme="dark"] .cst-miss{background:#3a1a1f;color:#f08799}
[data-theme="dark"] .cst-rest{background:#1a2230;color:#6b7890}
[data-theme="dark"] .hist-btn-del:hover{background:#3a1a1f;color:#f08799}
[data-theme="dark"] .seg-toggle button.seg-on{box-shadow:0 2px 6px rgba(0,0,0,.4)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:'JetBrains Mono',monospace}

/* ── APP SHELL ── */
.app{display:flex;min-height:100vh}
body{overflow-x:hidden}

/* ── SIDEBAR (desktop: trilho com ícones, expande ao passar o mouse) ── */
.side{width:64px;background:var(--card);border-right:1px solid var(--line);
  display:flex;flex-direction:column;position:fixed;left:0;top:0;height:100vh;z-index:100;flex-shrink:0;
  overflow:hidden;transition:width .22s cubic-bezier(.4,0,.2,1)}
.side:hover{width:240px;box-shadow:6px 0 28px rgba(20,25,45,.16)}
.side .logo-txt{display:none}
.side:hover .logo-txt{display:block}
.side .nav-item{justify-content:center}
.side:hover .nav-item{justify-content:flex-start}
.side .nav-item span:not(.badge){display:none}
.side:hover .nav-item span:not(.badge){display:inline}
.side .nav-item .badge{display:none}
.side:hover .nav-item .badge{display:inline-block}
.side .side-foot{display:none}
.side:hover .side-foot{display:block}
.side .side-logo{justify-content:center;padding-left:0;padding-right:0}
.side:hover .side-logo{justify-content:flex-start;padding-left:22px;padding-right:22px}
@media(min-width:921px){ .main{margin-left:64px} }
.side-logo{padding:22px 22px 18px;display:flex;align-items:center;gap:11px;
  border-bottom:1px solid var(--line)}
.logo-mark{width:36px;height:36px;border-radius:10px;
  background:linear-gradient(135deg,var(--brand),var(--brand2));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 12px rgba(91,61,245,.35)}
.logo-mark svg{width:20px;height:20px}
.logo-txt .t1{font-weight:800;font-size:15px;letter-spacing:-.02em;line-height:1}
.logo-txt .t2{font-size:10px;color:var(--ink2);font-weight:500;margin-top:2px}

.nav{padding:14px 12px;flex:1;display:flex;flex-direction:column;gap:3px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;
  border-radius:10px;cursor:pointer;color:var(--ink2);font-weight:600;
  transition:all .15s;font-size:13.5px}
.nav-item:hover{background:var(--bg);color:var(--ink)}
.nav-item.on{background:var(--brand-soft);color:var(--brand)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.nav-item .badge{margin-left:auto;font-size:10px;background:var(--bg);
  padding:2px 7px;border-radius:20px;font-weight:700}
.nav-item.on .badge{background:var(--card)}

.side-foot{padding:16px;border-top:1px solid var(--line)}
.prova-card{background:linear-gradient(135deg,var(--brand),var(--brand2));
  border-radius:12px;padding:14px;color:#fff}
.prova-card .lbl{font-size:10px;opacity:.85;font-weight:600;text-transform:uppercase;
  letter-spacing:.06em}
.prova-card .days{font-size:26px;font-weight:800;line-height:1.1;margin-top:3px}
.prova-card .sub{font-size:11px;opacity:.85;margin-top:2px}

/* ── MAIN ── */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{padding:16px 28px;display:flex;align-items:center;gap:16px;
  max-width:1180px;width:100%;margin:0 auto}
.topbar-wrap{background:var(--card);border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:40}
.topbar h1{font-size:19px;font-weight:800;letter-spacing:-.02em}
.topbar .crumb{font-size:12px;color:var(--ink2);font-weight:500}
.tb-spacer{flex:1}
.tb-stat{text-align:right}
.tb-stat .v{font-size:17px;font-weight:800;color:var(--brand)}
.tb-stat .l{font-size:10px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}

.content{padding:28px;max-width:1180px;width:100%;margin:0 auto}

/* ── TAB PANELS ── */
.panel{display:none}
.panel.on{display:block}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow)}
.card-pad{padding:20px}
.card-h{font-size:15px;font-weight:800;letter-spacing:-.01em;margin-bottom:3px}
.card-sub{font-size:12px;color:var(--ink2);font-weight:500}
.card-anim{}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}

/* ── STAT TILES ── */
.tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.tile .ic{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;margin-bottom:10px}
.tile .ic svg{width:18px;height:18px}
.tile .v{font-size:24px;font-weight:800;letter-spacing:-.02em;line-height:1}
.tile .l{font-size:11.5px;color:var(--ink2);font-weight:600;margin-top:3px}
.tile .delta{font-size:10.5px;font-weight:700;margin-top:6px}
/* cards ricos da Visão geral (ícone + valor na mesma linha, infos abaixo) */
.tile-rich{display:flex;flex-direction:column}
.tile-rich .ic{margin-bottom:0}
.tile-top{display:flex;align-items:center;gap:12px}
.l.up{text-transform:uppercase;letter-spacing:.04em;margin-top:8px}
.tile-top-split{justify-content:space-between}
.tile-top-r{display:flex;flex-direction:column;align-items:flex-end;text-align:right;gap:3px}
.tile-top-r .v{line-height:1}
.tile-top-r .l.up{margin-top:0}
.l.up.sm{font-size:9.5px}
.tile-sub{display:flex;flex-direction:column;gap:6px;margin-top:auto;padding-top:14px}
.tile-sub .tr{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--ink2);font-weight:600;gap:8px}
.tile-sub .tr b{color:var(--ink);font-weight:800}

/* ── CONSTÂNCIA ── */
.cst-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:16px}
.cst-title{font-size:15px;font-weight:800;letter-spacing:-.01em;color:var(--ink);
  display:flex;align-items:center;gap:7px}
.cst-help{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--line2);
  font-size:9px;display:inline-flex;align-items:center;justify-content:center;
  color:var(--ink2);cursor:help;font-weight:700}
.cst-msg{font-size:15px;font-weight:600;margin-top:6px;color:var(--ink)}
.cst-msg b{font-weight:800}
.cst-range{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  color:var(--ink2);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.cst-range-sep{opacity:.5}
.cst-cfg{margin-left:6px;width:26px;height:26px;border-radius:7px;border:1px solid var(--line);
  background:var(--card);cursor:pointer;color:var(--ink2);font-size:13px;
  display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.cst-cfg:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
/* ── CONSTÂNCIA estilo GitHub ── */
.ghc-wrap{overflow-x:auto;padding-top:4px}
.ghc-inner{width:fit-content;margin:0 auto}
.ghc-months{display:grid;grid-template-columns:repeat(26,1fr);gap:3px;margin-bottom:4px;min-width:560px}
.ghc-month{font-size:9px;font-weight:600;color:var(--ink2);white-space:nowrap}
.ghc-grid{display:flex;gap:3px}
.ghc-col{display:flex;flex-direction:column;gap:3px;flex:none;width:15px}
.ghc-cell{aspect-ratio:1;border-radius:3px;background:var(--bg);
  border:1px solid color-mix(in srgb, var(--ink2) 10%, transparent);transition:transform .1s}
.ghc-cell:hover{transform:scale(1.25);z-index:2}
.ghc-rest{background:color-mix(in srgb, var(--ink2) 8%, var(--bg))}
.ghc-future{background:var(--bg);border-color:color-mix(in srgb, var(--ink2) 8%, transparent)}
.ghc-l1{background:#9be9a8;border-color:#9be9a8}
.ghc-l2{background:#40c463;border-color:#40c463}
.ghc-l3{background:#30a14e;border-color:#30a14e}
.ghc-l4{background:#216e39;border-color:#216e39}
.ghc-legend{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:8px;
  font-size:10px;color:var(--ink2);font-weight:600}
.ghc-legend .ghc-cell{width:11px;height:11px;flex:none;aspect-ratio:auto}
[data-theme="dark"] .ghc-l1{background:#0e4429;border-color:#0e4429}
[data-theme="dark"] .ghc-l2{background:#006d32;border-color:#006d32}
[data-theme="dark"] .ghc-l3{background:#26a641;border-color:#26a641}
[data-theme="dark"] .ghc-l4{background:#39d353;border-color:#39d353}
@media(max-width:920px){
  .cst-head{flex-direction:row;gap:8px}
}

/* ── CONSTÂNCIA ── (fim) */

/* ── DASH TOP ROW + THEME TOGGLE ── */
.dash-toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;gap:12px}
.dash-greeting{font-size:13px;font-weight:700;color:var(--ink2);letter-spacing:.01em}
.theme-toggle{position:relative;display:inline-flex;align-items:center;
  border:1px solid var(--line);background:var(--bg);border-radius:999px;
  padding:3px;cursor:pointer;height:32px;box-sizing:border-box;transition:border-color .2s}
.theme-toggle:hover{border-color:var(--line2)}
.tt-thumb{position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;
  background:var(--brand);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:1;
  box-shadow:0 2px 6px rgba(91,61,245,.4)}
.theme-toggle.is-dark .tt-thumb{transform:translateX(24px)}
.tt-ico{position:relative;z-index:2;width:24px;height:24px;display:flex;
  align-items:center;justify-content:center;color:var(--ink2);transition:color .2s}
.tt-ico svg{width:14px;height:14px}
.theme-toggle:not(.is-dark) .tt-sun{color:#fff}
.theme-toggle.is-dark .tt-moon{color:#fff}
/* botão de tema na barra lateral (desktop) */
.side-theme-row{display:flex;justify-content:flex-end;margin-top:12px}
.side-theme{width:40px;height:40px;border-radius:11px;border:1px solid var(--line2);
  background:var(--card);color:var(--ink2);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:all .15s}
.side-theme:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.side-theme svg{width:20px;height:20px}
.side-theme .ti-sun{display:none}
[data-theme="dark"] .side-theme .ti-moon{display:none}
[data-theme="dark"] .side-theme .ti-sun{display:block}
@media(min-width:921px){ .topbar .theme-toggle{display:none} }
.nav-fab{display:none}

/* ── ESTUDO SEMANAL & TEMPO DE ESTUDO ── */
.weekly-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
.prog-head{flex-direction:column;align-items:stretch;gap:10px}
.prog-datenav{margin-top:0;align-self:flex-start}
.prog-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between}

/* ── PAINEL DE DISCIPLINAS ── */
.painel-scroll{overflow-x:auto}
.painel-tbl{width:100%;border-collapse:collapse;min-width:560px}
.painel-tbl th{font-size:12px;font-weight:800;color:var(--ink2);padding:10px 12px;
  border-bottom:2px solid var(--line);text-align:center}
.painel-tbl th.pt-disc{text-align:left}
.painel-tbl td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px}
.painel-tbl tbody tr{transition:background .12s}
.painel-tbl tbody tr:hover{background:var(--bg)}
.pt-disc{text-align:left;min-width:170px}
.pt-name{font-weight:700;font-size:13.5px}
.pt-c{text-align:center}
.pt-time{font-family:'JetBrains Mono',monospace;font-weight:500;color:var(--ink)}
.pt-total{font-weight:700;color:var(--ink)}
.pt-badge{display:inline-block;min-width:32px;padding:3px 8px;border-radius:7px;
  font-size:11px;font-weight:800;font-family:'JetBrains Mono',monospace}
.painel-tbl tfoot td{border-top:2px solid var(--line);border-bottom:none;
  font-size:13.5px;padding-top:13px}
.painel-tbl tfoot{background:var(--bg)}
.week-nav{display:flex;align-items:center;gap:6px;margin-top:4px}
.week-nav-btn{width:24px;height:24px;border-radius:7px;border:1px solid var(--line);
  background:var(--card);cursor:pointer;color:var(--ink2);padding:0;
  display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.week-nav-btn svg{width:14px;height:14px}
.week-nav-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.week-nav-btn:disabled{opacity:.3;cursor:default}
.week-range{font-size:12.5px;font-weight:700;color:var(--ink2);
  font-family:'JetBrains Mono',monospace;min-width:108px;text-align:center}
.seg-toggle{display:inline-flex;background:var(--bg);border-radius:9px;padding:3px;gap:2px}
.seg-toggle button{border:none;background:transparent;cursor:pointer;font-family:inherit;
  font-size:11px;font-weight:700;color:var(--ink2);padding:6px 14px;border-radius:7px;transition:all .15s}
.seg-toggle button.seg-on{background:var(--green);color:#fff;box-shadow:0 2px 6px rgba(22,185,129,.3)}
.seg-toggle-full{display:flex;width:100%}
.seg-toggle-full button{flex:1}
.weekly-legend{display:flex;gap:20px;margin-top:8px;font-size:12px;font-weight:600;color:var(--ink2)}
.evo-legend{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;justify-content:center}
.evo-leg{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--line2);
  background:var(--card);border-radius:8px;padding:6px 16px;cursor:pointer;
  font-family:inherit;font-size:12px;font-weight:700;color:var(--ink2);transition:all .15s}
.evo-leg:hover{border-color:var(--lc)}
.evo-leg.on{background:var(--lc);border-color:var(--lc);color:#fff;
  box-shadow:0 2px 8px color-mix(in srgb, var(--lc) 40%, transparent)}
.weekly-legend .wl-dot{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px}
.pie-wrap{display:flex;flex-direction:column;height:100%;min-height:300px}
.pie-donut{display:flex;justify-content:center;align-items:center;flex:1;padding:8px 0}
.pie-legend{display:flex;flex-direction:column;justify-content:space-around;gap:9px;flex:1;padding-top:6px}
.pl-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.pl-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0}
.pl-name{font-weight:600;white-space:nowrap}
.pl-line{flex:1;border-bottom:1px dotted var(--line2);min-width:10px;margin:0 2px}
.pl-time{font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ink2);white-space:nowrap}
.donut-flex{display:flex;flex-direction:column;align-items:stretch;gap:18px}
.donut-flex.chart-fill{justify-content:center}
.donut-box{position:relative;width:170px;height:170px;flex-shrink:0;align-self:center}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center}
.donut-center .big{font-size:30px;font-weight:800;letter-spacing:-.02em}
.donut-center .lbl{font-size:10px;color:var(--ink2);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.donut-legend{width:100%;display:flex;flex-direction:column;justify-content:center;gap:11px}
.dleg{display:flex;align-items:center;gap:10px;cursor:pointer}
.dleg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dleg-name{font-size:13px;font-weight:700;flex-shrink:0;white-space:nowrap;min-width:112px}
.dleg-bar{flex:1;min-width:36px;height:11px;background:var(--bg);border-radius:6px;overflow:hidden}
.dleg-bar i{display:block;height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.dleg-pct{font-size:11px;font-weight:700;color:var(--ink2);min-width:34px;text-align:right}

/* ── CICLO (study cycle) ── */
.cycle-track{display:flex;flex-direction:column;gap:10px}
.cyc-item{display:block;padding:14px 16px 14px 18px;
  background:var(--card);border:1px solid var(--line);border-radius:12px;
  transition:all .15s;position:relative;overflow:hidden}
.cyc-item:hover{border-color:var(--line2);box-shadow:var(--shadow)}
.cyc-item.current{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.cyc-item.done-cyc{opacity:.6}
.cyc-bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.cyc-row{display:flex;align-items:center;gap:12px}
/* lista de pesos editável (Ciclo) */
.peso-list{display:flex;flex-direction:column;gap:2px}
.peso-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid var(--line)}
.peso-row:last-child{border-bottom:none}
.peso-dot{width:11px;height:11px;border-radius:3px;flex:none}
.peso-name{font-size:13.5px;font-weight:700;flex:1;min-width:0}
.peso-tipo{font-size:11px;font-weight:700;color:var(--ink2);background:var(--bg);
  padding:3px 9px;border-radius:20px;white-space:nowrap}
.peso-stepper{display:flex;align-items:center;gap:6px;flex:none}
.peso-btn{width:28px;height:28px;border-radius:8px;border:1px solid var(--line2);
  background:var(--card);color:var(--ink);font-size:17px;font-weight:700;line-height:1;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.peso-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.peso-val{min-width:26px;text-align:center;font-size:15px;font-weight:800;color:var(--ink);
  font-family:'JetBrains Mono',monospace}
/* ── Peso das matérias: tiles lado a lado ── */
.peso-grid{display:grid;grid-template-columns:repeat(var(--peso-cols,7),minmax(0,1fr));gap:10px}
.peso-tile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;
  padding:13px 9px;border:1px solid var(--line);border-radius:14px;background:var(--card)}
.peso-tile-name{font-size:13px;font-weight:800;line-height:1.2;min-height:32px;
  display:flex;align-items:center;justify-content:center}
.peso-prog{position:relative;width:100%;height:26px;border-radius:9px;background:var(--bg);overflow:hidden}
.peso-prog i{position:absolute;left:0;top:0;bottom:0;display:block;border-radius:9px;
  transition:width .5s cubic-bezier(.4,0,.2,1)}
.peso-prog .peso-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:13.5px;font-weight:800;color:var(--ink);font-family:'JetBrains Mono',monospace;z-index:1}
.peso-ctrl{display:flex;align-items:center;justify-content:center;gap:8px}
@media(max-width:920px){
  .peso-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px}
}
/* listas dos cards Metas de ciclo / Agenda de matérias */
.ord-list{display:flex;flex-direction:column;gap:2px}
.ord-row{display:flex;align-items:center;gap:12px;padding:10px 4px;border-bottom:1px solid var(--line)}
.ord-row:last-child{border-bottom:none}
.ord-pos{font-size:12px;font-weight:800;color:var(--ink2);width:18px;text-align:center;flex:none;font-family:'JetBrains Mono',monospace}
.ord-dot{width:11px;height:11px;border-radius:4px;flex:none}
.ord-name{font-weight:700;font-size:13.5px;flex:1}
.ord-btns{display:flex;gap:6px;flex:none}
.ord-btn{width:30px;height:30px;border:1px solid var(--line2);background:var(--card);color:var(--ink2);
  border-radius:8px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ord-btn:hover:not(:disabled){border-color:var(--brand);color:var(--brand)}
.ord-btn:disabled{opacity:.35;cursor:not-allowed}
/* card consolidado "Configuração de matérias" */
.cfg-grid{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:12px}
.cfg-tile{min-width:0;border:1px solid var(--line2);border-radius:14px;padding:12px;background:var(--card);
  display:flex;flex-direction:column;gap:10px}
.cfg-head{display:flex;flex-direction:column;align-items:flex-start;gap:4px}
.cfg-name{font-weight:800;font-size:13.5px;line-height:1.15}
.cfg-blocks{display:flex;flex-direction:column;gap:9px}
.cfg-block{border:1px solid var(--line);border-radius:11px;padding:9px;background:var(--bg)}
.cfg-block>label{display:block;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.03em;color:var(--ink2);margin-bottom:7px;line-height:1.2}
.cfg-peso{display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:7px}
.cfg-peso .peso-prog{flex:0 0 100%;min-width:0}
.cfg-blocks .peso-btn,.cfg-blocks .ord-btn{width:24px;height:24px;font-size:11px;flex:none}
.cfg-order{display:flex;align-items:center;justify-content:center;gap:8px}
.cfg-pos{font-size:14px;font-weight:800;min-width:22px;text-align:center;font-family:'JetBrains Mono',monospace}
.cfg-blocks .dp-trigger{padding:7px 8px;font-size:11.5px;gap:5px}
.cfg-blocks .dp-trigger .agenda-lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.cfg-blocks .dp-trigger svg{width:15px;height:15px}
@media(max-width:640px){
  .cfg-grid{grid-auto-flow:row;grid-auto-columns:auto;grid-template-columns:1fr 1fr}
}
@media(max-width:400px){
  .cfg-grid{grid-template-columns:1fr}
}
/* ── SIMULADOS ── */
.sim-top{display:grid;grid-template-columns:1fr 2fr;gap:14px;margin-bottom:18px}
.sim-left{display:flex;flex-direction:column;gap:14px}
.sim-stat{display:flex;flex-direction:column;justify-content:center}
.sim-cap{font-size:11px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em}
.sim-big{font-size:34px;font-weight:800;letter-spacing:-.02em;margin-top:8px}
.sim-last{display:flex;align-items:flex-end;justify-content:space-between;margin-top:10px;gap:10px}
.sim-last-lines{font-size:12px;font-weight:600;color:var(--ink2);line-height:1.7}
.sim-last-pct{font-size:30px;font-weight:800;letter-spacing:-.02em}
.sim-chart-card{display:flex;flex-direction:column}
.sim-chart-card .chart-fill{flex:1;min-height:170px}
.sim-list{display:flex;flex-direction:column;gap:10px}
.sim-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);
  border-radius:13px;padding:14px 16px}
.sim-date{font-size:12px;font-weight:600;color:var(--ink2);min-width:64px;font-family:'JetBrains Mono',monospace}
.sim-name-wrap{flex:1;min-width:0}
.sim-name{font-size:14px;font-weight:700;color:var(--brand)}
.sim-sub{font-size:11.5px;color:var(--ink2);font-weight:500;margin-top:1px}
.sim-metrics{display:flex;align-items:center;gap:14px}
.sim-m{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--ink2);white-space:nowrap}
.sim-m svg{width:15px;height:15px;color:var(--ink2)}
.sim-num{font-size:13.5px;font-weight:800;min-width:22px;text-align:center}
.sim-badge{color:#fff;font-size:12px;font-weight:800;border-radius:7px;padding:4px 9px;min-width:34px;text-align:center}
.sim-actions{display:flex;gap:4px}
@media(max-width:920px){
  .sim-top{grid-template-columns:1fr}
}
@media(max-width:640px){
  .sim-row{flex-wrap:wrap;gap:8px 12px}
  .sim-date{min-width:auto}
  .sim-name-wrap{flex:1 1 60%}
  .sim-metrics{flex:1 1 100%;justify-content:space-between;gap:8px}
  .sim-actions{flex:none}
}
.cyc-n{width:30px;height:30px;border-radius:9px;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-weight:800;
  font-size:13px;flex-shrink:0}
.cyc-info{flex:1;min-width:0}
.cyc-name{font-weight:700;font-size:14px}
.cyc-meta{font-size:11px;color:var(--ink2);font-weight:500;margin-top:1px}
.cyc-time{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;
  color:var(--ink2);font-family:'JetBrains Mono',monospace;white-space:nowrap;flex-shrink:0}
.cyc-progbar{height:7px;background:var(--bg);border-radius:4px;overflow:hidden;margin-top:10px}
.cyc-progbar i{display:block;height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
/* barra de ações revelada no hover */
.cyc-actions-bar{display:flex;gap:18px;align-items:center;flex-wrap:wrap;
  max-height:0;opacity:0;overflow:hidden;
  transition:max-height .25s ease,opacity .2s ease,margin-top .25s ease;margin-top:0}
.cyc-item:hover .cyc-actions-bar{max-height:60px;opacity:1;margin-top:12px}
.cyc-act{display:inline-flex;align-items:center;gap:7px;border:none;background:none;
  cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);
  padding:2px 0;transition:color .15s}
.cyc-act:hover{color:var(--brand)}
.cyc-act svg{width:16px;height:16px;flex-shrink:0}
.cyc-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.tag-th{background:var(--blue-soft);color:var(--blue)}
.tag-rv{background:var(--rv-soft);color:var(--rv)}
.tag-ex{background:var(--amber-soft);color:var(--amber)}
@media(max-width:640px){
  .cyc-actions-bar{gap:10px;flex-direction:column;align-items:flex-start}
  .cyc-item:hover .cyc-actions-bar{max-height:140px}
  /* em telas de toque, mostra as ações sempre */
  .cyc-actions-bar{max-height:140px;opacity:1;margin-top:12px}
}

/* ── EDITAL VERTICALIZADO ── */
.disc-block{margin-bottom:14px}
.disc-head{display:flex;align-items:center;gap:12px;padding:14px 18px;
  background:var(--card);border:1px solid var(--line);border-radius:13px;
  cursor:pointer;transition:all .15s}
.disc-head:hover{border-color:var(--line2)}
.disc-head.open-d{border-radius:13px 13px 0 0;border-bottom-color:transparent}
.disc-bar{width:5px;height:34px;border-radius:3px;flex-shrink:0}
.disc-tt{flex:1}
.disc-tt .n{font-weight:800;font-size:14.5px}
.disc-tt .m{font-size:11px;color:var(--ink2);font-weight:500}
.disc-prog-wrap{display:flex;align-items:center;gap:12px;flex-shrink:0}
.disc-pbar{width:120px;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.disc-pbar i{display:block;height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.disc-pct{font-size:13px;font-weight:800;min-width:40px;text-align:right}
.disc-chev{width:18px;height:18px;color:var(--ink2);transition:transform .2s}
.disc-head.open-d .disc-chev{transform:rotate(180deg)}

.disc-items{display:none;border:1px solid var(--line);border-top:none;
  border-radius:0 0 13px 13px;overflow:hidden;background:var(--card)}
.disc-items.show{display:block}
.eitem{display:flex;align-items:center;gap:12px;padding:11px 18px;
  border-top:1px solid var(--line);cursor:pointer;transition:background .12s}
.eitem:hover{background:var(--bg)}
.eitem.studied{background:var(--green-soft)}
.echk{width:20px;height:20px;border:2px solid var(--line2);border-radius:6px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.eitem.studied .echk{background:var(--green);border-color:var(--green)}
.echk svg{width:11px;height:9px;display:none}
.eitem.studied .echk svg{display:block}
.etext{flex:1;font-size:13px;font-weight:500}
.eitem.studied .etext{color:var(--ink2);text-decoration:line-through;text-decoration-color:var(--line2)}
.estats{display:flex;gap:10px;flex-shrink:0;align-items:center}
.estat{font-size:10.5px;font-weight:700;color:var(--ink2);white-space:nowrap}
.eq-mini{display:flex;align-items:center;gap:4px}
.eq-acc{padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}

/* ── SEMANA (weekly board) ── */
/* ── QUADRO SEMANAL (novo modelo) ── */
.sem-layout{display:grid;grid-template-columns:1fr 232px;gap:18px;align-items:start}
.sem-main{min-width:0}
.sem-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;flex-wrap:wrap}
.sem-nav{display:flex;align-items:center;gap:10px}
.sem-month{font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--brand);min-width:150px;text-align:center}
.sem-range{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--ink2);
  border:1px solid var(--line);border-radius:8px;padding:6px 14px}
.sem-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;align-items:start}
.sem-col{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;
  display:flex;flex-direction:column;min-height:160px}
.sem-colh{padding:10px 8px;text-align:center;border-bottom:1px solid var(--line);background:var(--bg)}
.sem-colh.sem-today{background:var(--green);}
.sem-dn{font-size:12px;font-weight:700;color:var(--ink)}
.sem-colh.sem-today .sem-dn{color:#fff}
.sem-body{padding:8px;display:flex;flex-direction:column;gap:8px;flex:1}
.sem-card{padding:9px 10px;border-radius:9px;cursor:pointer;transition:transform .12s,box-shadow .12s;
  background:var(--bg);overflow:hidden}
.sem-card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.sem-card-mat{font-weight:700;font-size:12.5px;line-height:1.2;margin-bottom:4px;
  overflow-wrap:anywhere;word-break:break-word}
.sem-card-h{font-size:10.5px;color:var(--ink2);font-weight:600;display:flex;align-items:center;
  gap:4px;flex-wrap:wrap;line-height:1.3}
.sem-rev{border:1px solid var(--line);background:var(--card)}
.sem-card-top{font-size:11px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:5px;margin-bottom:6px}
.sem-rev-tag{display:inline-block;font-size:9.5px;font-weight:800;padding:3px 8px;border-radius:6px;
  letter-spacing:.03em;overflow-wrap:anywhere;line-height:1.3}
/* card estudado — esmaecido, com tempo real registrado */
.sem-card.sem-done{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--line2);
  position:relative;opacity:.85;padding-bottom:28px}
.sem-done-top{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
  color:var(--ink2);text-decoration:line-through;text-decoration-color:var(--line2);margin-bottom:3px}
.sem-done-sub{font-size:10px;color:var(--muted,#9aa6bd);font-weight:500}
.sem-done-h{position:absolute;right:8px;bottom:8px;font-size:10px;font-weight:700;
  font-family:'JetBrains Mono',monospace;color:var(--ink2);
  background:var(--card);border:1px solid var(--line);border-radius:20px;padding:2px 8px;
  display:flex;align-items:center;gap:4px}
.sem-done-h::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.sem-empty{font-size:11px;color:var(--muted,#9aa6bd);text-align:center;padding:8px 0}

/* sidebar: mini-calendário + filtros */
.sem-side{display:flex;flex-direction:column;gap:14px;position:sticky;top:78px}
.minical{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.mc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:6px}
.mc-month{font-size:13px;font-weight:800;letter-spacing:.04em;color:var(--ink2)}
.mc-nav{display:flex;align-items:center;gap:5px}
.mc-arrow{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);
  background:var(--card);cursor:pointer;color:var(--ink2);padding:0;
  display:inline-flex;align-items:center;justify-content:center;transition:all .15s}
.mc-arrow svg{width:12px;height:12px}
.mc-arrow:hover:not(:disabled){border-color:var(--green);color:var(--green);background:var(--green-soft)}
.mc-arrow:disabled{opacity:.3;cursor:default}
.mc-range{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:var(--green);white-space:nowrap}
.mc-today-btn{width:100%;margin-top:10px;padding:8px;border-radius:9px;border:1px solid var(--green);
  background:var(--green-soft);color:var(--green);font-family:inherit;font-size:12px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.mc-today-btn:hover{background:var(--green);color:#fff}
.rev-rule{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px}
.rev-rule-title{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--ink2);
  text-transform:uppercase;margin-bottom:6px}
.rev-rule-text{font-size:11.5px;color:var(--ink2);line-height:1.5}
.rev-rule-text b{color:var(--green);font-weight:700}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc-dow{font-size:10px;font-weight:700;color:var(--ink2);text-align:center;padding:3px 0}
.mc-day{font-size:11px;font-weight:600;text-align:center;padding:5px 0;border-radius:7px;
  cursor:pointer;color:var(--ink);transition:background .12s}
.mc-day:hover{background:var(--bg)}
.mc-off{color:var(--muted,#9aa6bd);opacity:.5}
.mc-inweek{background:var(--green-soft)}
.mc-today{background:var(--green);color:#fff;font-weight:800}
.mc-today:hover{background:var(--green)}
.sem-filters{background:transparent;border:none;border-radius:0;padding:0}
.sem-filters-title{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--ink2);
  text-transform:uppercase;margin-bottom:10px}
.sem-filter-chips{display:flex;flex-wrap:wrap;gap:8px}
.sem-filter{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:999px;
  border:1.5px solid var(--line2);background:var(--card);cursor:pointer;font-family:inherit;
  font-size:12.5px;font-weight:700;color:var(--ink2);user-select:none;transition:all .14s}
.sem-filter.on{background:var(--c);border-color:var(--c);color:#fff}
.sem-filter:not(.on){opacity:.9}
.sem-filter:not(.on):hover{border-color:var(--c);color:var(--ink)}
@media(max-width:920px){
  .sem-layout{grid-template-columns:1fr}
  .sem-side{flex-direction:row;flex-wrap:wrap;position:static;order:-1}
  .minical,.sem-filters{flex:1;min-width:220px}
  /* abaixo do desktop: calendário mensal primeiro, 3 dias por vez */
  .sem-range{display:none}
  /* controle de data do board é desnecessário (o calendário mensal já navega) */
  .sem-head{display:none}
  .sem-main{overflow-x:visible}
  .sem-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;min-width:0}
  .sem-col{width:auto;min-height:0}
  .sem-colh{text-align:center;padding:8px 6px}
  /* filtros centralizados numa única linha */
  .sem-filters{flex-basis:100%}
  .sem-filters-title{text-align:center}
  .sem-filter-chips{justify-content:center;flex-wrap:nowrap}
  .sem-filter{padding:7px 11px;font-size:12px}
}
@media(max-width:640px){
  .sem-side{flex-direction:column}
  .sem-filter{padding:6px 9px;font-size:11.5px;gap:5px}
}

/* ── CALENDAR ── */
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav{display:flex;gap:8px;align-items:center}
.cal-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;color:var(--ink2)}
.cal-btn:hover{border-color:var(--line2);color:var(--ink)}
.cal-month-lbl{font-size:17px;font-weight:800;min-width:150px;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{font-size:11px;font-weight:700;color:var(--ink2);text-align:center;
  padding:6px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-cell{min-height:80px;border:1px solid var(--line);border-radius:11px;
  padding:7px;cursor:pointer;transition:all .12s;position:relative;
  display:flex;flex-direction:column;background:var(--card);overflow:hidden}
.cal-cell:hover{border-color:var(--line2);box-shadow:var(--shadow);z-index:2}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-off{opacity:.4}
.cal-inweek{background:var(--green-soft);border-color:var(--green-soft)}
.cal-today-cell{border-color:var(--green);box-shadow:0 0 0 2px var(--green-soft)}
.cal-today-cell .cal-dnum{display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;border-radius:10px;background:var(--green);color:#fff}
.cal-today-btn{display:flex;width:fit-content;align-items:center;gap:7px;margin:16px auto 0;padding:8px 16px;
  border-radius:10px;border:1px solid var(--green);background:transparent;color:var(--green);
  font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.cal-today-btn:hover{background:var(--green);color:#fff}
.cal-dnum{font-size:12px;font-weight:700}
.cal-mat{font-size:9px;font-weight:700;line-height:1.15;margin-top:2px;
  overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cal-stripe{height:3px;border-radius:2px;margin-top:auto}
.cal-h{font-size:9px;color:var(--ink2);font-weight:600;margin-top:3px}
.cal-icons{position:absolute;top:5px;right:5px;font-size:8px}

/* ── METAS (goals) ── */
.goal-row{display:flex;align-items:center;gap:16px;padding:16px 0;border-bottom:1px solid var(--line)}
.goal-row:last-child{border-bottom:none}
.goal-ring{position:relative;width:64px;height:64px;flex-shrink:0}
.goal-info{flex:1}
.goal-name{font-weight:700;font-size:14px}
.goal-sub{font-size:12px;color:var(--ink2);margin-top:1px}
.goal-bignum{font-size:20px;font-weight:800;text-align:right}
.goal-bignum .of{font-size:12px;color:var(--ink2);font-weight:600}
.goal-gear{flex-shrink:0;width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);
  background:transparent;color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  padding:0;transition:all .14s}
.goal-gear svg{width:17px;height:17px}
.goal-gear:hover{color:var(--brand);border-color:var(--brand);background:var(--brand-soft)}
.pm-row{padding:12px 0;border-bottom:1px solid var(--line)}
.pm-row:last-child{border-bottom:none}
.pm-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.pm-label{font-size:13px;font-weight:800;margin-bottom:7px}
.pm-barline{display:flex;align-items:center;gap:10px}
.pm-bar{flex:1;display:flex;gap:2px;height:26px;border-radius:7px;overflow:hidden}
.pm-seg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800;min-width:0}
.pm-meta{font-size:11px;color:var(--ink2);font-weight:600;margin-top:6px}
.pm-meta b{color:var(--ink);font-weight:800}
/* ── Metas pomodoro: grade de donuts ── */
.pmd-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:20px 16px;margin-top:6px}
.pmd-tile{display:flex;flex-direction:column;align-items:center;text-align:center}
.pmd-head{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px}
.pmd-title{font-size:13.5px;font-weight:800;text-transform:capitalize}
.pmd-head .goal-gear{width:28px;height:28px}
.pmd-head .goal-gear svg{width:15px;height:15px}
.pmd-donut{position:relative;width:150px;height:150px}
.pmd-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pmd-center .big{font-size:19px;font-weight:800;line-height:1;letter-spacing:-.01em}
.pmd-center .lbl{font-size:9px;color:var(--ink2);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.pmd-stats{margin-top:12px;font-size:12px;color:var(--ink2);font-weight:600;line-height:1.7}
.pmd-stats b{color:var(--ink);font-weight:800}
.cfg-box{border:1px solid var(--line2);border-radius:12px;padding:6px 14px;margin:10px 0}
.cfg-box-h{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--ink2);margin:8px 0 2px}
.cfg-box .cfg-row:last-child{border-bottom:none}
.cfg-row.no-line{border-bottom:none}
.help-badge{display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;
  background:var(--line2);color:var(--ink2);font-size:11px;font-weight:800;cursor:help;position:relative;margin-left:7px;vertical-align:middle}
.help-badge:hover::after{content:attr(data-tip);position:absolute;left:50%;top:calc(100% + 9px);transform:translateX(-50%);
  background:var(--ink);color:var(--card);padding:8px 11px;border-radius:9px;font-size:12px;font-weight:600;line-height:1.4;
  width:max-content;max-width:230px;white-space:normal;text-transform:none;letter-spacing:0;z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.help-badge:hover::before{content:'';position:absolute;left:50%;top:calc(100% + 3px);transform:translateX(-50%);
  border:6px solid transparent;border-bottom-color:var(--ink);z-index:20}

/* bars chart */
.bars{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:12px}
/* cards de gráfico preenchem toda a altura do quadro */
.chart-card{display:flex;flex-direction:column}
.chart-fill{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:160px}
.chart-card .bars{height:auto;flex:1;min-height:150px}
.chart-fill svg{height:auto}
#weeklyChart.chart-fill{justify-content:center}
#pieChart.chart-fill{justify-content:stretch}
#pieChart .pie-wrap{flex:1}
.bar-col{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
.bar-fill-wrap{flex:1;width:100%;display:flex;align-items:flex-end;justify-content:center}
.bar-fill{width:68%;border-radius:6px 6px 0 0;transition:height .6s cubic-bezier(.4,0,.2,1);min-height:3px;position:relative}
.bar-val{font-size:12px;font-weight:800;color:var(--ink2);white-space:nowrap;text-transform:uppercase}
.bar-lbl{font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:600;color:var(--ink2);
  text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}

/* timer */
.timer-box{text-align:center;padding:4px 0}
.timer-disp{font-size:52px;font-weight:800;letter-spacing:-.02em;font-family:'JetBrains Mono',monospace}
.timer-mat{font-size:13px;color:var(--ink2);font-weight:600;margin-bottom:18px}
.timer-controls{display:flex;gap:10px;justify-content:center;margin-top:10px;margin-bottom:14px}
.tc-btn{flex:1;height:50px;border-radius:13px;border:1px solid var(--line2);background:var(--card);
  color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.tc-btn svg{width:22px;height:22px}
.tc-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.tc-btn.tc-primary{background:var(--brand);border-color:var(--brand);color:#fff}
.tc-btn.tc-primary:hover{background:var(--brand);color:#fff;filter:brightness(1.06)}
.tc-btn.set{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
/* ── POMODORO ── */
.pomo-phase{font-size:20px;font-weight:800;margin:4px 0 0;text-align:center;text-transform:uppercase;letter-spacing:.02em}
.pomo-tri-track{position:relative;height:12px;margin-bottom:0}
.pomo-tri{position:absolute;top:0;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;
  border-top:11px solid var(--ink);transform:translateX(-50%);transition:left 1s linear;animation:triPulse 1.7s ease-in-out infinite}
@keyframes triPulse{0%,100%{opacity:1;transform:translateX(-50%) scale(1)}50%{opacity:.4;transform:translateX(-50%) scale(.68)}}
.pomo-bar{position:relative;height:46px;border-radius:10px;overflow:hidden;margin:0 0 12px}
.pomo-layer{position:absolute;inset:0;display:flex}
.pomo-gray{filter:grayscale(1) brightness(1.08) opacity(.5)}
.pomo-color{transition:clip-path .5s ease}
.pomo-solid{position:absolute;top:0;bottom:0;left:0;right:0;z-index:1;border-radius:8px;
  opacity:0;visibility:hidden;transition:left .85s cubic-bezier(.33,1,.68,1), right .85s cubic-bezier(.33,1,.68,1), background-color .85s cubic-bezier(.33,1,.68,1), opacity .35s ease}
.pomo-solid.on{opacity:1;visibility:visible}
.pomo-solid-fill{position:absolute;top:0;bottom:0;left:0;width:0;transition:width 1s linear}
.pseg{display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800;min-width:0}
.pomo-readout{display:flex;justify-content:center;align-items:center;margin-bottom:12px}
.pomo-readout #pomoTime{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:800}
.pomo-dlg-msg{font-size:14.5px;font-weight:700;color:var(--ink);text-align:center;margin:6px 0 18px;line-height:1.55}
.pomo-ctrls{display:flex;gap:12px;justify-content:center;margin-bottom:14px}
.pomo-btn{width:50px;height:50px;border-radius:50%;border:1px solid var(--line2);background:var(--card);
  color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pomo-btn svg{width:20px;height:20px}
.pomo-btn:hover{border-color:var(--brand);color:var(--brand)}
.pomo-btn.on{background:var(--brand);border-color:var(--brand);color:#fff}
.cfg-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line)}
.cfg-row:last-of-type{border-bottom:none}
.cfg-lbl{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;color:var(--ink)}
.cfg-lbl i{width:11px;height:11px;border-radius:3px;display:inline-block}
.stepper{display:flex;align-items:center;gap:9px}
.stepper b{min-width:26px;text-align:center;font-size:17px;font-weight:800;color:var(--ink)}
.stepper .step-u{font-size:11px;color:var(--ink2);font-weight:600;margin-left:-5px}
.step-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line2);background:var(--card);
  color:var(--ink);font-size:19px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  line-height:1;transition:all .12s}
.step-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.timer-types{display:flex;gap:8px;justify-content:center;margin-bottom:12px}
/* blocos do modal de registro (páginas, videoaulas, checkboxes) */
.reg-block{margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:10px;background:var(--bg)}
.reg-block-title{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink2);margin-bottom:8px}
.reg-check{display:flex;align-items:center;gap:9px;margin-top:10px;cursor:pointer;font-size:13.5px;font-weight:700;color:var(--ink)}
.reg-check input{width:17px;height:17px;accent-color:var(--brand);cursor:pointer}
.reg-hint{font-size:11px;color:var(--ink2);margin-top:4px;margin-left:1px}
.rev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.rev-opt{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;
  border:1.5px solid var(--line);border-radius:9px;cursor:pointer;font-size:13px;font-weight:700;
  color:var(--ink2);transition:all .15s}
.rev-opt.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
.rev-opt input{display:none}

/* botões Páginas / Videoaulas + popups */
.reg-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.reg-open{position:relative;display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 10px;border:1px solid var(--line2);border-radius:11px;background:var(--card);
  color:var(--ink);font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}
.reg-open:hover{border-color:var(--brand);background:var(--brand-soft)}
.reg-open svg{width:18px;height:18px;color:var(--ink2);flex:none}
.reg-open:hover svg{color:var(--brand)}
.reg-dot{display:none;width:8px;height:8px;border-radius:50%;background:var(--brand);
  position:absolute;top:9px;right:9px}
.reg-dot.on{display:block}
/* cores específicas dos botões */
#openPag{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}
#openPag svg{color:var(--amber)}
#openPag .reg-dot{background:var(--amber)}
#openPag:hover{background:var(--amber-soft);border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-soft)}
#openVid{background:var(--pink-soft);border-color:var(--pink);color:var(--pink)}
#openVid svg{color:var(--pink)}
#openVid .reg-dot{background:var(--pink)}
#openVid:hover{background:var(--pink-soft);border-color:var(--pink);box-shadow:0 0 0 2px var(--pink-soft)}
/* linha do checkbox + ícone de ajuda com tooltip */
.reg-check-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.reg-check-row .reg-check{margin-top:0}
.help{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--line2);color:var(--ink2);
  font-size:11px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;
  cursor:help;position:relative;flex:none}
.help:hover,.help:focus{border-color:var(--brand);color:var(--brand);outline:none}
.help::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%);
  background:var(--ink);color:var(--card);font-size:11.5px;font-weight:600;line-height:1.4;
  padding:8px 11px;border-radius:9px;width:220px;text-align:left;white-space:normal;
  opacity:0;visibility:hidden;transition:opacity .15s;z-index:60;box-shadow:var(--shadow-lg)}
.help::before{content:"";position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:var(--ink);opacity:0;visibility:hidden;transition:opacity .15s}
.help:hover::after,.help:focus::after,.help:hover::before,.help:focus::before{opacity:1;visibility:visible}
.sub-ov{position:fixed;inset:0;background:rgba(20,25,45,.55);backdrop-filter:blur(2px);
  z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;visibility:hidden;pointer-events:none;transition:none}
.sub-ov.open{opacity:1;visibility:visible;pointer-events:auto}
.sub{background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow-lg);padding:20px;width:340px;max-width:100%}
.sub-title{font-weight:800;font-size:15px;color:var(--ink);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sub-title svg{width:18px;height:18px;color:var(--brand)}
.sub-actions{display:flex;gap:10px;margin-top:18px}
.sub-actions .btn{flex:1;justify-content:center}
.tt-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--line);
  background:var(--card);color:var(--ink);cursor:pointer;font-weight:700;font-size:12px;transition:all .15s}
.tt-btn.on-th{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
.tt-btn.on-rv{background:var(--rv-soft);border-color:var(--rv);color:var(--rv)}
.tt-btn.on-ex{background:var(--amber-soft);border-color:var(--amber);color:var(--amber)}

/* buttons */
.btn{padding:10px 18px;border-radius:11px;border:none;cursor:pointer;
  font-weight:700;font-size:13px;font-family:inherit;transition:all .15s;
  display:inline-flex;align-items:center;gap:7px}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(91,61,245,.3)}
.btn-primary:hover{background:var(--brand2);transform:translateY(-1px)}
.btn-ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--line2)}
.btn svg{width:16px;height:16px}
.btn-sm{padding:6px 12px;font-size:11.5px;border-radius:8px}

/* modal */
.ov{position:fixed;inset:0;background:rgba(20,25,45,.45);backdrop-filter:blur(3px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;visibility:hidden;pointer-events:none;transition:none}
.ov.open{opacity:1;visibility:visible;pointer-events:auto}
.ov .modal,.sub-ov .sub,.dp-ov .dp{transform:none}
.modal{background:var(--card);border-radius:18px;padding:24px;max-width:440px;
  width:100%;box-shadow:var(--shadow-lg);position:relative;
  max-height:88vh;overflow-y:auto}
.modal-x{position:absolute;top:16px;right:16px;width:30px;height:30px;border-radius:8px;
  border:none;background:var(--bg);cursor:pointer;color:var(--ink2);font-size:16px;
  display:flex;align-items:center;justify-content:center}
.modal-x:hover{background:var(--line)}

/* seletor de data customizado (com fundo esmaecido) */
.dp-trigger{width:100%;text-align:left;padding:10px 12px;border:1px solid var(--line2);
  border-radius:10px;font-family:inherit;font-size:13px;background:var(--card);color:var(--ink);
  cursor:pointer;display:flex;align-items:center;gap:8px}
.dp-trigger:hover{border-color:var(--brand)}
.dp-trigger svg{width:16px;height:16px;color:var(--ink2);margin-left:auto;flex:none}
.dp-ov{position:fixed;inset:0;background:rgba(20,25,45,.55);backdrop-filter:blur(2px);
  z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;visibility:hidden;pointer-events:none;transition:none}
.dp-ov.open{opacity:1;visibility:visible;pointer-events:auto}
.dp{background:var(--card);border:1px solid var(--line);border-radius:16px;
  box-shadow:var(--shadow-lg);padding:16px;width:300px;max-width:100%}
.dp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.dp-title{font-weight:800;font-size:14px;color:var(--ink);flex:1;text-align:center}
.dp-nav{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);
  color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.dp-nav:hover{border-color:var(--line2);color:var(--ink)}
.dp-nav svg{width:16px;height:16px}
.dp-dows{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.dp-dow{text-align:center;font-size:11px;font-weight:700;color:var(--ink2);padding:4px 0}
.dp-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dp-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:9px;
  font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;border:1px solid transparent}
.dp-cell:hover{background:var(--bg)}
.dp-cell.off{color:var(--ink2);opacity:.4}
.dp-cell.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.dp-cell.today{border-color:var(--brand)}
.dp-cell.sel,.dp-cell.sel:hover{background:var(--brand);color:#fff}
.dp-foot{display:flex;justify-content:space-between;align-items:center;margin-top:12px}
.dp-link{background:none;border:none;color:var(--brand);font-weight:700;font-size:12.5px;cursor:pointer;padding:4px}
.dp-link:hover{text-decoration:underline}

.field{margin-bottom:10px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink2);margin-bottom:6px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line2);
  border-radius:10px;font-family:inherit;font-size:13px;background:var(--card);color:var(--ink);color-scheme:light}
[data-theme="dark"] .field input,[data-theme="dark"] .field select{color-scheme:dark}
.field input:focus,.field select:focus{outline:none;border-color:var(--brand)}
/* campo de data com botão de calendário ao final */
.dp-inline{position:relative}
.dp-inline input{padding-right:40px}
.dp-inline-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);
  width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:var(--ink2);
  display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .15s}
.dp-inline-btn:hover{color:var(--brand);background:var(--brand-soft)}
.dp-inline-btn svg{width:18px;height:18px}
/* linha de matéria do Novo simulado: Matéria larga, numéricos estreitos, sem setas */
.sim-mat-row{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;gap:10px;align-items:start}
.sim-mat-row .field{margin-bottom:8px}
.sim-mat-row input[type=number]{-moz-appearance:textfield;appearance:textfield}
.sim-mat-row input[type=number]::-webkit-outer-spin-button,
.sim-mat-row input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.task-detail-line{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.task-detail-line:last-child{border:none}
.tdl-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink2);
  min-width:74px;font-weight:500}

/* history list */
.hist-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--line)}
.hist-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.hist-datectrl{display:flex;align-items:center;gap:8px}
.hist-datectrl .week-nav{margin-top:0}
.hist-cal-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line2);background:var(--card);
  color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none}
.hist-cal-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.hist-cal-btn svg{width:17px;height:17px}
.hist-row:last-child{border:none}
.hist-actions{display:flex;gap:6px;flex-shrink:0;opacity:.35;transition:opacity .15s}
.hist-row:hover .hist-actions{opacity:1}
.hist-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);
  background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--ink2);transition:all .15s;padding:0}
.hist-btn svg{width:15px;height:15px}
.hist-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.hist-btn-del:hover{border-color:#ef4444;color:#ef4444;background:#fee2e2}
.btn-danger{background:#ef4444;color:#fff}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px)}
@media(max-width:920px){.hist-actions{opacity:1}}
.hist-dot{width:8px;height:8px;border-radius:3px;flex-shrink:0}
.hist-mat{font-weight:700;font-size:13.5px;flex:1}
.hist-meta{font-size:11px;color:var(--ink2);font-weight:500}
.hist-time{font-weight:800;font-size:14px;font-family:'JetBrains Mono',monospace}
.hist-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}

.empty-state{text-align:center;padding:40px 20px;color:var(--ink2)}
.empty-state svg{width:48px;height:48px;margin-bottom:12px;opacity:.4}

.section-title{font-size:13px;font-weight:800;text-transform:uppercase;
  letter-spacing:.05em;color:var(--ink2);margin:24px 0 12px}

/* mobile */
/* ───────── TABLET ───────── */
@media(max-width:920px){
  .side{width:64px;position:sticky;top:0;transform:none;z-index:auto}
  .side:hover{width:64px;box-shadow:none}
  .side:hover .nav-item{justify-content:center}
  .side:hover .nav-item span:not(.badge){display:none}
  .side:hover .logo-txt{display:none}
  .side:hover .side-foot{display:none}
  .side:hover .side-logo{justify-content:center;padding-left:0;padding-right:0}
  .logo-txt,.nav-item span:not(.badge),.side-foot{display:none}
  .nav-item{justify-content:center}
  .nav-item .badge{display:none}
  .g2,.g3,.g4{grid-template-columns:1fr}
  .tiles{grid-template-columns:1fr 1fr}

<script>

escador artesanal (Lei 10.779/03)", "14.1 LOAS — Benefício de Prestação Continuada (BPC)", "14.2 LOAS — Auxílio-Inclusão", "14.3-5 LOAS — Leis 8.742/93, 14.176/21 e Decreto 6.214/07", "15.1-3 RPPS — CTC, contagem recíproca, compensação", "15.4 RPPS — Lei 9.796/99 e Decreto 10.188/19", "16 Emenda Constitucional nº 103/2019", "17 Lei Complementar nº 142/2013", "18 Lei nº 8.212/1991 (Custeio)", "19 Lei nº 8.213/1991 (Benefícios)", "20 Decreto nº 3.048/1999 (Regulamento)", "21 Instrução Normativa PRES/INSS nº 128/2022", "22 O servidor público como agente de desenvolvimento social", "23 Saúde e qualidade de vida no serviço público"]}, {"id": "port", "name": "Língua Portuguesa", "short": "Português", "color": "#f59e0b", "tipo": "Básicos", "peso": 4, "items": ["1 Compreensão e interpretação de textos", "2 Tipologia textual", "3 Ortografia oficial", "4 Acentuação gráfica", "5 Emprego das classes de palavras", "6 Emprego do sinal indicativo de crase", "7 Sintaxe da oração e do período", "8 Pontuação", "9 Concordância nominal e verbal", "10 Regências nominal e verbal", "11 Significação das palavras", "12 Redação de correspondências oficiais (Manual da PR)"]}, {"id": "adm", "name": "Noções de Direito Administrativo", "short": "Administrativo", "color": "#34d399", "tipo": "Básicos", "peso": 4, "items": ["1 Estado, governo e administração pública", "2 Direito administrativo: conceito, fontes e princípios", "3 Organização administrativa da União; direta e indireta", "4a Agentes públicos: espécies, cargo, emprego e função", "4b Lei 8.112/90: provimento, vacância, remoção, substituição", "4c Lei 8.112/90: direitos e vantagens", "4d Lei 8.112/90: regime disciplinar", "4e Lei 8.112/90: responsabilidade civil, criminal e administrativa", "5 Poderes administrativos", "6 Ato administrativo", "7 Serviços Públicos", "8a Controle e responsabilização da administração", "8b Lei nº 8.429/1992 (Improbidade)", "9 Lei nº 9.784/1999 (Processo Administrativo)"]}, {"id": "const", "name": "Noções de Direito Constitucional", "short": "Constitucional", "color": "#818cf8", "tipo": "Básicos", "peso": 3, "items": ["1a Direitos e deveres individuais e coletivos", "1b Direitos sociais", "1c Nacionalidade", "1d Cidadania", "1e Garantias constitucionais individuais", "1f Garantias dos direitos coletivos, sociais e políticos", "2 Administração pública (arts. 37 a 41 CF/88)"]}, {"id": "rl", "name": "Raciocínio Lógico-Matemático", "short": "Raciocínio", "color": "#a78bfa", "tipo": "Básicos", "peso": 3, "items": ["1a Proposições, valores lógicos, sentenças abertas", "1b Tabela-verdade, conectivos, proposições simples e compostas", "2 Tautologia", "3 Operação com conjuntos", "4 Cálculos com porcentagens"]}, {"id": "info", "name": "Noções de Informática", "short": "Informática", "color": "#22d3ee", "tipo": "Básicos", "peso": 2, "items": ["1 Conceitos de Internet e intranet", "2 Tecnologias, ferramentas e procedimentos de informática", "3 LibreOffice: textos, planilhas e apresentações", "4 Sistemas operacionais Windows 7 e 10", "5 Navegação e correio eletrônico", "6 Segurança: vírus, worms e derivados"]}, {"id": "etica", "name": "Ética no Serviço Público", "short": "Ética", "color": "#fb7185", "tipo": "Básicos", "peso": 2, "items": ["1 Código de Ética — Decreto nº 1.171/1994", "2 Decreto nº 6.029/2007 (Sistema de Gestão da Ética)"]}], "cycle": ["prev", "port", "prev", "adm", "prev", "port", "adm", "const", "rl", "prev", "port", "adm", "const", "rl", "info", "etica", "prev", "port", "adm", "const", "rl", "info", "etica"], "total_items": 92};

// ════════ STATE ════════
const SKEY = 'meu_estudo_inss_v1';
function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem(SKEY));
    return saved ? Object.assign(defaultState(), saved) : defaultState();
  }
  catch{ return defaultState(); }
}
function defaultState(){
  return {
    studied:{},        // itemKey -> true
    itemStats:{},      // itemKey -> {minutes, qTotal, qRight}
    sessions:[],       // {date, disc, tipo, minutes, q, qr}
    cycleProgress:{},  // cycleIndex -> percent (0-100)
    cyclePos:0,
    goals:{ horasSemana:30, questoesSemana:300, horasDia:5, horasDiaInicial:1, horasDiaFinal:6, intervaloMeses:6, horasDiaInicio:null, questoesInicial:100, questoesFinal:500, questoesIntervaloMeses:6, questoesInicio:null },
    restDays:[],       // dias da semana (0=Dom..6=Sáb) tratados como folga neutra
    revManual:[],      // revisões programadas manualmente {disc, date, base, dias}
    pesos:{},          // discId -> peso editado pelo usuário (sobrescreve o do edital)
    cstView:'geral',   // janela da constância: 'mes' | 'ano' | 'geral'
    simulados:[],      // {date, name, tipo, tempo, total, acertos, brancos, erros}
    cycleOrder:null,   // ordem das matérias no ciclo (array de ids) — null = padrão do edital
    agenda:{},         // discId -> data (dd/mm/aaaa) em que a matéria entra no cronograma
    theme:'light',     // 'light' | 'dark'
  };
}
let S = loadState();
function save(){ localStorage.setItem(SKEY, JSON.stringify(S)); }

// ════════ HELPERS ════════
const DISC = DATA.disciplines;
const DMAP = {}; DISC.forEach(d=>DMAP[d.id]=d);
// ── ordem do ciclo (configurável em "Metas de ciclo") ──
function defaultCycleOrder(){ const seen=[]; DATA.cycle.forEach(id=>{ if(!seen.includes(id)) seen.push(id); }); return seen; }
function cycleOrder(){ return (S.cycleOrder && S.cycleOrder.length) ? S.cycleOrder.filter(id=>DMAP[id]) : defaultCycleOrder(); }
function buildCycleFromOrder(order){ // sequência ponderada pelo peso, intercalada e espalhada, na ordem dada
  const items=order.map(id=>({id, peso:(DMAP[id]&&DMAP[id].peso)||1, acc:0}));
  const total=items.reduce((s,x)=>s+x.peso,0); if(!total) return order.slice();
  const seq=[];
  for(let k=0;k<total;k++){
    items.forEach(x=>x.acc+=x.peso);
    let best=items[0]; for(const x of items) if(x.acc>best.acc) best=x;
    best.acc-=total; seq.push(best.id);
  }
  return seq;
}
function rebuildCycle(){ CYCLE = buildCycleFromOrder(cycleOrder()); } // sempre aplica ordem + pesos atuais
// siglas de 3 letras para o gráfico "Tempo por disciplina"
const SIGLA={prev:'PRV',port:'POR',adm:'ADM',const:'CON',rl:'RAC',info:'INF',etica:'ETI'};
// aplica pesos editados pelo usuário (persistidos) sobre os valores do edital
DISC.forEach(d=>{ if(S.pesos && S.pesos[d.id]!=null) d.peso=S.pesos[d.id]; });
let CYCLE = DATA.cycle.slice();
rebuildCycle(); // aplica a ordem salva em S.cycleOrder, se houver
const TODAY = (()=>{ const d=new Date(); d.setHours(0,0,0,0); return d; })(); // data real (hoje)
const PROVA = new Date(2027,5,30);

const TIPO_LABEL={th:'Teoria',rv:'Revisão',ex:'Questões'};
const TIPO_COLOR={th:'#3b82f6',rv:'#a855f7',ex:'#f59e0b'};
const TIPO_CLASS={th:'tag-th',rv:'tag-rv',ex:'tag-ex'};

function itemKey(dId,idx){ return dId+'::'+idx; }
function discDone(d){
  let n=0; d.items.forEach((_,i)=>{ if(S.studied[itemKey(d.id,i)]) n++; });
  return n;
}
function discPct(d){ return d.items.length? Math.round(discDone(d)/d.items.length*100):0; }
function totalItems(){ return DISC.reduce((s,d)=>s+d.items.length,0); }
function totalDone(){ return DISC.reduce((s,d)=>s+discDone(d),0); }
function totalPct(){ return Math.round(totalDone()/totalItems()*100); }
function totalMinutes(){ return S.sessions.reduce((s,x)=>s+x.minutes,0); }
function todayMinutes(){ const t=todayISO(); return S.sessions.filter(s=>s.date===t).reduce((a,b)=>a+b.minutes,0); }
function metaHorasDia(at){ // meta diária na data informada (padrão: agora) segundo o intervalo de evolução
  const g=S.goals, now=at||new Date();
  if(!g.horasDiaInicio) return g.horasDia||5;
  const ini=g.horasDiaInicial||1, fim=(g.horasDiaFinal!=null?g.horasDiaFinal:ini), meses=g.intervaloMeses||1;
  const start=new Date(g.horasDiaInicio+'T00:00:00');
  const mesesPassados=(now-start)/(1000*60*60*24*30.44);
  const frac=meses>0?Math.max(0,Math.min(1,mesesPassados/meses)):1;
  return ini+(fim-ini)*frac;
}
function metaQuestoes(at){ // meta semanal de questões na data informada (padrão: agora)
  const g=S.goals, now=at||new Date();
  if(!g.questoesInicio) return g.questoesSemana||300;
  const ini=g.questoesInicial||0, fim=(g.questoesFinal!=null?g.questoesFinal:ini), meses=g.questoesIntervaloMeses||1;
  const start=new Date(g.questoesInicio+'T00:00:00');
  const mesesPassados=(now-start)/(1000*60*60*24*30.44);
  const frac=meses>0?Math.max(0,Math.min(1,mesesPassados/meses)):1;
  return Math.round(ini+(fim-ini)*frac);
}
// ── Metas Pomodoro: 5 períodos (1°..4° mês + Demais), cada um com blocos/tempos/matérias ──
const POMO_META_LABELS=['1° mês','2° mês','3° mês','4° mês','Demais meses'];
function pomoMetas(){
  if(!S.pomoMetas || S.pomoMetas.length!==5){
    S.pomoMetas=POMO_META_LABELS.map(()=>({work:25,short:5,long:15,blocks:4,materias:3}));
    S.pomoMetasFocoV=1;
  }
  if(!S.pomoMetasFocoV){ S.pomoMetas.forEach(c=>{ c.blocks=Math.max(1,Math.round((c.blocks||8)/2)); }); S.pomoMetasFocoV=1; }
  return S.pomoMetas;
}
function pomoMetaBlocks(cfg){ // blocks = nº de blocos de FOCO; pausa longa (azul) a cada 4 focos quando há mais blocos a seguir
  const F=Math.max(1,cfg.blocks||4), out=[];
  for(let f=1; f<=F; f++){
    out.push({min:cfg.work||25, type:'work'});
    if(f<F) out.push(f%4===0 ? {min:cfg.long||15,type:'long'} : {min:cfg.short||5,type:'short'});
  }
  return out;
}
function pomoMetaIndexForDate(date){ // qual período (0..4) para uma data, com base nos meses desde o início da progressão
  const g=S.goals; let start=g.horasDiaInicio?new Date(g.horasDiaInicio+'T00:00:00'):new Date(TODAY);
  const months=Math.floor((date-start)/(1000*60*60*24*30.44));
  return Math.min(4, Math.max(0, months));
}
function currentPomoMetaIndex(){ return pomoMetaIndexForDate(TODAY); }
function currentPomoMeta(){ return pomoMetas()[currentPomoMetaIndex()]; }
function pomoMetaFocoMin(cfg){ return pomoMetaBlocks(cfg).filter(b=>b.type==='work').reduce((a,b)=>a+b.min,0); } // horas líquidas (min) de um pomodoro
function metaHorasDiaPomodoro(date){ return pomoMetaFocoMin(pomoMetas()[pomoMetaIndexForDate(date)]); } // meta de minutos de estudo/dia conforme Metas pomodoro
function totalQ(){ return S.sessions.reduce((s,x)=>s+(x.q||0),0); }

  S.sessions.forEach(s=>{ if(s.paginas){ const a=parseInt(s.paginas.ini),b=parseInt(s.paginas.fim);
    if(!isNaN(a)&&!isNaN(b)&&b>=a) n+=(b-a+1); } });
  return n;

function parseClock(str){ // "mm:ss" ou "hh:mm:ss" -> minutos
  if(!str) return 0;
  const p=String(str).split(':').map(Number);
  if(p.some(isNaN)) return 0;
  if(p.length===3) return p[0]*60+p[1]+p[2]/60;
  if(p.length===2) return p[0]+p[1]/60;
  return p[0]||0;
}
function totalVideoMin(){
  let m=0;
  S.sessions.forEach(s=>{ if(s.video){ const d=parseClock(s.video.fim)-parseClock(s.video.ini); if(d>0) m+=d; } });
  return Math.round(m);
}

// ════════ DONUT BUILDER ════════
function donut(pct,size,stroke,color){
  // anel de progresso no mesmo estilo do card "Tempo de estudo":
  // trilho cinza + arco colorido com pontas retas de cantos arredondados
  const cx=size/2, cy=size/2, midR=size/2-stroke/2-2;
  const rOut=midR+stroke/2, rIn=midR-stroke/2, TAU=Math.PI*2;
  const P=(R,a)=>`${(cx+R*Math.cos(a)).toFixed(3)} ${(cy+R*Math.sin(a)).toFixed(3)}`;
  function seg(a0,a1){
    let cr=Math.min(stroke*0.32, rOut*(a1-a0)*0.42); if(cr<0.1) cr=0.1;
    const dOut=cr/rOut, dIn=cr/rIn, oa0=a0+dOut, oa1=a1-dOut, ia0=a0+dIn, ia1=a1-dIn;
    const laOut=(oa1-oa0)>Math.PI?1:0, laIn=(ia1-ia0)>Math.PI?1:0;
    return `M ${P(rOut,oa0)} A ${rOut} ${rOut} 0 ${laOut} 1 ${P(rOut,oa1)} `
      +`Q ${P(rOut,a1)} ${P(rOut-cr,a1)} L ${P(rIn+cr,a1)} Q ${P(rIn,a1)} ${P(rIn,ia1)} `
      +`A ${rIn} ${rIn} 0 ${laIn} 0 ${P(rIn,ia0)} Q ${P(rIn,a0)} ${P(rIn+cr,a0)} `
      +`L ${P(rOut-cr,a0)} Q ${P(rOut,a0)} ${P(rOut,oa0)} Z`;
  }
  const frac=Math.max(0,Math.min(100,pct))/100, start=-Math.PI/2;
  let arc='';
  if(frac>=0.999){
    arc=`<circle cx="${cx}" cy="${cy}" r="${midR}" fill="none" stroke="${color}" stroke-width="${stroke}"/>`;
  }else if(frac>0){
    arc=`<path d="${seg(start, start+frac*TAU)}" fill="${color}"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${cx}" cy="${cy}" r="${midR}" fill="none" stroke="${cssVar('--grid')}" stroke-width="${stroke}"/>
    ${arc}
  </svg>`;
}

// ════════ CONSTÂNCIA NOS ESTUDOS ════════
// Deriva os dias com estudo a partir das sessões registradas.
// Estados: 'done' (estudou), 'miss' (dia passado sem estudo),
//          'rest' (dia de folga programada/neutro), 'future' (ainda não chegou)
function dateKeyBR(d){ // Date -> "dd/mm/aaaa"
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function todayISO(){ // TODAY -> "aaaa-mm-dd" (para input type=date)
  const y=TODAY.getFullYear(),m=String(TODAY.getMonth()+1).padStart(2,'0'),d=String(TODAY.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}
function isoToBR(iso){ // "aaaa-mm-dd" -> "dd/mm/aaaa"
  if(!iso) return dateKeyBR(TODAY);
  const[y,m,d]=iso.split('-');
  return `${d}/${m}/${y}`;
}
// retângulo com raio independente no topo (rt) e na base (rb) — para barras empilhadas
function roundedRect(x,y,w,h,rt,rb){
  rt=Math.min(rt,w/2,h); rb=Math.min(rb,w/2,h);
  if(h<=0) return '';
  return `M ${(x+rt).toFixed(1)} ${y.toFixed(1)} `+
    `H ${(x+w-rt).toFixed(1)} `+
    (rt>0?`A ${rt} ${rt} 0 0 1 ${(x+w).toFixed(1)} ${(y+rt).toFixed(1)} `:'')+
    `V ${(y+h-rb).toFixed(1)} `+
    (rb>0?`A ${rb} ${rb} 0 0 1 ${(x+w-rb).toFixed(1)} ${(y+h).toFixed(1)} `:'')+
    `H ${(x+rb).toFixed(1)} `+
    (rb>0?`A ${rb} ${rb} 0 0 1 ${x.toFixed(1)} ${(y+h-rb).toFixed(1)} `:'')+
    `V ${(y+rt).toFixed(1)} `+
    (rt>0?`A ${rt} ${rt} 0 0 1 ${(x+rt).toFixed(1)} ${y.toFixed(1)} `:'')+
    `Z`;
}
function studiedDaysSet(){
  const set=new Set();
  S.sessions.forEach(s=>{ if(s.minutes>0||s.q>0) set.add(s.date); });
  return set;
}
// minutos estudados por dia (chave dd/mm/aaaa)
function minutesByDay(){
  const m={};
  S.sessions.forEach(s=>{ m[s.date]=(m[s.date]||0)+s.minutes; });
  return m;
}
// nível de intensidade 0..4 a partir dos minutos (estilo GitHub)
function intensityLevel(min){
  if(!min) return 0;
  if(min<30) return 1;
  if(min<90) return 2;
  if(min<180) return 3;
  return 4;
}
function constanciaConfig(){
  // dias da semana marcados como "folga programada" (neutros) — padrão: nenhum
  // 0=Dom ... 6=Sáb. Usuário pode ajustar via botão.
  return S.restDays || [];
}
function buildConstancia(nDays){
  const studied=studiedDaysSet();
  const rest=constanciaConfig();
  const hasHistory=studied.size>0;
  const days=[];
  // janela terminando em TODAY
  for(let i=nDays-1;i>=0;i--){
    const d=new Date(TODAY); d.setDate(d.getDate()-i);
    const key=dateKeyBR(d);
    let state;
    if(studied.has(key)) state='done';
    else if(rest.includes(d.getDay())) state='rest';
    else if(!hasHistory) state='rest';  // sem nenhum registro ainda → neutro, não "falha"
    else state='miss';
    days.push({date:d,key,state,dow:d.getDay()});
  }
  return days;
}
function computeStreak(days){
  // sequência atual: conta de trás pra frente; 'rest' não quebra, 'miss' quebra
  let cur=0;
  for(let i=days.length-1;i>=0;i--){
    if(days[i].state==='done') cur++;
    else if(days[i].state==='rest') continue;
    else break;
  }
  // recorde: maior sequência de 'done' (rest não quebra)
  let best=0,run=0;
  days.forEach(d=>{
    if(d.state==='done'){ run++; best=Math.max(best,run); }
    else if(d.state==='rest'){ /* mantém */ }
    else run=0;
  });
  return {cur,best};
}
function renderConstancia(){
  const N=28;
  const daysWin=buildConstancia(N);
  const {cur,best}=computeStreak(daysWin);
  const studied=studiedDaysSet();

  // mensagem

  if(studied.size===0){

  } else {
    msg=`Você está há <b>${cur} ${cur===1?'dia':'dias'}</b> sem falhar!`;
  }

  // ── Grade estilo GitHub: começa na semana mais antiga entre o início do ciclo,
  // hoje e a 1ª sessão registrada (assim o estudo de hoje/recente sempre aparece) ──
  const INICIO=new Date(2026,5,15); // início do ciclo (15/06/2026)
  let anchor=new Date(Math.min(INICIO.getTime(), TODAY.getTime()));
  S.sessions.forEach(s=>{ const sd=parseBRDate(s.date); if(sd && sd<anchor) anchor=sd; });
  const firstSunday=new Date(anchor); firstSunday.setDate(anchor.getDate()-anchor.getDay());
  // última coluna: semana da prova
  const lastSunday=new Date(PROVA); lastSunday.setDate(PROVA.getDate()-PROVA.getDay());
  // janela visível conforme o seletor (Mês / Ano / Geral)
  const cstView=S.cstView||'geral';
  const todayW=new Date(TODAY); todayW.setDate(TODAY.getDate()-TODAY.getDay());
  let viewFirst, viewLast;
  if(cstView==='geral'){ viewFirst=new Date(firstSunday); viewLast=new Date(lastSunday); }
  else if(cstView==='ano'){ // a partir do início dos estudos, janela de 1 ano (até no máximo a semana da prova)
    viewFirst=new Date(firstSunday);
    let vl=new Date(firstSunday); vl.setDate(firstSunday.getDate()+51*7);

  } else { // mes: últimas 5 semanas
    viewLast=new Date(todayW);
    viewFirst=new Date(todayW); viewFirst.setDate(todayW.getDate()-4*7);
  }
  const WEEKS=Math.max(1, Math.round((viewLast-viewFirst)/(7*86400000))+1);

  const MNABR=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const rest=constanciaConfig();

  // monta colunas
  let cols='', monthLabels='';

    const colSunday=new Date(viewFirst); colSunday.setDate(viewFirst.getDate()+w*7);
    // rótulo de mês quando vira o mês (na primeira semana do mês)

      monthLabels+=`<div class="ghc-month" style="grid-column:${w+1}">${MNABR[colSunday.getMonth()]}</div>`;
      lastMonthShown=colSunday.getMonth();
    }
    let cells='';
    for(let dow=0; dow<7; dow++){
      const d=new Date(colSunday); d.setDate(colSunday.getDate()+dow);
      const future = d>TODAY;
      const key=dateKeyBR(d);
      const min=minMap[key]||0;
      const lvl=intensityLevel(min);
      const isRest=rest.includes(d.getDay());
      let cls='ghc-cell';
      if(future) cls+=' ghc-future';
      else if(lvl>0) cls+=' ghc-l'+lvl;
      else if(isRest) cls+=' ghc-rest';
      const title = future ? dateKeyBR(d) : `${dateKeyBR(d)} — ${min?fmtH(min)+' estudadas':(isRest?'Folga':'Sem registro')}`;
      cells+=`<div class="${cls}" title="${title}"></div>`;
    }
    cols+=`<div class="ghc-col">${cells}</div>`;
  }

  return `
  <div class="card card-pad" style="margin-bottom:18px">
    <div class="cst-head">
      <div>
        <div class="cst-title">Constância nos estudos</div>

      </div>
      <div class="seg-toggle" id="cstViewToggle">
        <button data-cstv="mes"${cstView==='mes'?' class="seg-on"':''}>Mês</button>
        <button data-cstv="ano"${cstView==='ano'?' class="seg-on"':''}>Ano</button>
        <button data-cstv="geral"${cstView==='geral'?' class="seg-on"':''}>Geral</button>
      </div>
    </div>
    <div class="ghc-wrap">
      <div class="ghc-inner">
        <div class="ghc-months" style="grid-template-columns:repeat(${WEEKS},15px);min-width:${WEEKS*18}px">${monthLabels}</div>
        <div class="ghc-grid" style="min-width:${WEEKS*18}px">${cols}</div>
      </div>
    </div>
    <div class="ghc-legend">
      <span>Menos</span>
      <div class="ghc-cell"></div>
      <div class="ghc-cell ghc-l1"></div>
      <div class="ghc-cell ghc-l2"></div>
      <div class="ghc-cell ghc-l3"></div>
      <div class="ghc-cell ghc-l4"></div>
      <span>Mais</span>
    </div>
  </div>`;
}
